<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Classifica Fantaballa</title>
  <link rel="icon" type="image/png" sizes="512x512" href="assets/site-icon-512.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="assets/site-icon-192.png" />
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png" />
  <link rel="shortcut icon" href="assets/favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --paper:#efe4c9;
      --paper-2:#f7f0de;
      --ink:#2a2419;
      --muted:#7d745f;
      --line:#cdbf9f;
      --strong:#231d15;
      --gold:#e8c95d;
      --red:#d94b35;
      --shadow-soft:0 10px 30px rgba(69,51,20,.12);
    }
    * { box-sizing:border-box; }
    html, body { min-height:100%; }
    body {
      margin:0;
      background:
        radial-gradient(circle at 12% 14%, rgba(255,255,255,.26), transparent 18%),
        radial-gradient(circle at 86% 9%, rgba(255,255,255,.2), transparent 16%),
        linear-gradient(135deg, #eadbb9 0%, #efe4c9 38%, #f6efdd 100%);
      color:var(--ink);
      font-family:Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    body:before {
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      opacity:.17;
      background-image:
        repeating-linear-gradient(0deg, rgba(123,104,62,.08) 0 1px, transparent 1px 7px),
        repeating-linear-gradient(90deg, rgba(123,104,62,.05) 0 1px, transparent 1px 9px);
      mix-blend-mode:multiply;
    }
    .page {
      position:relative;
      width:min(1420px, calc(100% - 48px));
      margin:0 auto;
      padding:18px 0 32px;
    }
    .masthead {
      min-height:48px;
      display:flex;
      justify-content:center;
      align-items:center;
      text-align:center;
      background:linear-gradient(180deg, #e4c14e 0%, #d9b449 100%);
      border:2px solid rgba(35,29,21,.35);
      border-top-width:4px;
      box-shadow:var(--shadow-soft);
      border-radius:16px 16px 10px 10px;
      margin-bottom:18px;
      font-weight:900;
      letter-spacing:.08em;
      text-transform:uppercase;
      transform:rotate(-.35deg);
    }
    .dot { color:var(--red); margin-right:8px; font-size:18px; }
    .actions {
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      margin-bottom:14px;
      flex-wrap:wrap;
    }
    .back-btn, .refresh-btn {
      appearance:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:46px;
      padding:12px 18px;
      border-radius:16px;
      border:2px solid #ccb580;
      background:linear-gradient(180deg,#fffef9,#f1e7cf);
      color:#2a2419;
      text-decoration:none;
      font-weight:900;
      text-transform:uppercase;
      letter-spacing:.04em;
      box-shadow:0 4px 0 rgba(128,108,64,.14);
      cursor:pointer;
    }
    .refresh-btn {
      border-color:#a83220;
      background:linear-gradient(180deg,#e25b43,#c8402b);
      color:#fff;
      box-shadow:0 4px 0 rgba(153,46,29,.22);
    }
    .leaderboard {
      position:relative;
      background:linear-gradient(180deg,#fffefb,#f4ead6);
      border:2px solid rgba(99,84,56,.22);
      box-shadow:var(--shadow-soft);
      border-radius:24px;
      padding:24px;
      overflow:hidden;
    }
    .leaderboard:before {
      content:"";
      position:absolute;
      top:-8px;
      right:24px;
      width:72px;
      height:18px;
      border-radius:3px;
      background:rgba(239,230,176,.9);
      border:1px solid rgba(143,126,77,.18);
      transform:rotate(4deg);
      opacity:.92;
    }
    .leaderboard-head {
      display:flex;
      justify-content:space-between;
      gap:18px;
      align-items:flex-start;
      margin-bottom:16px;
    }
    .logo {
      width:min(150px, 42vw);
      height:auto;
      display:block;
      margin-bottom:10px;
      filter:drop-shadow(0 8px 14px rgba(0,0,0,.12));
    }
    .label {
      font-size:12px;
      font-weight:900;
      letter-spacing:.24em;
      color:#8a7446;
      text-transform:uppercase;
      margin-bottom:8px;
    }
    h1 {
      margin:0;
      font-size:clamp(34px, 6vw, 62px);
      line-height:.9;
      letter-spacing:-.05em;
      text-transform:uppercase;
    }
    .sub {
      margin:10px 0 0;
      color:#6d675b;
      font-weight:900;
      line-height:1.35;
    }
    .updated {
      align-self:flex-start;
      white-space:nowrap;
      border:1px solid #e2d2ac;
      background:#fff7df;
      color:#6d5418;
      border-radius:999px;
      padding:8px 11px;
      font-size:12px;
      font-weight:900;
      text-transform:uppercase;
      letter-spacing:.08em;
    }
    .table-wrap {
      overflow:auto;
      border-radius:18px;
      border:1px solid #e2d2ac;
      background:rgba(255,255,255,.58);
    }
    table {
      width:100%;
      border-collapse:separate;
      border-spacing:0;
      min-width:0;
    }
    th, td {
      padding:14px 13px;
      border-bottom:1px dashed #ddcfaf;
      text-align:left;
      font-weight:900;
    }
    th {
      color:#8a7446;
      font-size:12px;
      letter-spacing:.14em;
      text-transform:uppercase;
      background:#fff7df;
    }
    th:first-child, td:first-child { width:64px; text-align:center; }
    th:nth-child(2), td:nth-child(2) { min-width:220px; }
    th:nth-child(3), td:nth-child(3),
    th:nth-child(4), td:nth-child(4),
    th:nth-child(5), td:nth-child(5),
    th:nth-child(7), td:nth-child(7),
    th:nth-child(8), td:nth-child(8) { text-align:center; }
    th:last-child, td:last-child { min-width:210px; }
    tr:last-child td { border-bottom:0; }
    .rank {
      display:inline-grid;
      place-items:center;
      width:38px;
      height:38px;
      border-radius:999px;
      background:#fff7df;
      border:1px solid #ead093;
      color:#8a6210;
      font-weight:900;
    }
    .count {
      display:inline-flex;
      min-width:48px;
      min-height:36px;
      align-items:center;
      justify-content:center;
      border-radius:14px;
      background:#2f2619;
      color:#fff;
      font-size:18px;
      font-weight:900;
      padding:5px 10px;
    }
    .stat-pill {
      display:inline-flex;
      min-height:32px;
      align-items:center;
      justify-content:center;
      border-radius:999px;
      padding:5px 10px;
      background:#fff7df;
      border:1px solid #ead093;
      color:#6d5418;
      font-weight:900;
      white-space:nowrap;
    }
    .team-cell strong { display:block; font-size:17px; }
    .team-cell small { display:block; color:#8a8170; font-size:11px; margin-top:3px; text-transform:uppercase; letter-spacing:.08em; }
    .scorer-cell { max-width:260px; white-space:normal; line-height:1.25; }
    .empty {
      color:#8a8170;
    }
    .note {
      margin:14px 0 0;
      padding:12px 14px;
      border:1px solid #e2d2ac;
      background:#fff7df;
      border-radius:16px;
      color:#6d5418;
      font-weight:900;
      line-height:1.35;
    }

    @media (min-width:901px) {
      .table-wrap { overflow-x:visible; }
      table { min-width:0; table-layout:fixed; }
      th, td { min-width:0; padding:12px 10px; white-space:normal; overflow-wrap:anywhere; }
      th:first-child, td:first-child { width:64px; }
      th:nth-child(2), td:nth-child(2) { width:22%; }
      th:nth-child(3), td:nth-child(3),
      th:nth-child(4), td:nth-child(4),
      th:nth-child(5), td:nth-child(5) { width:7.5%; }
      th:nth-child(6), td:nth-child(6) { width:12%; text-align:center; }
      th:nth-child(7), td:nth-child(7) { width:9%; }
      th:nth-child(8), td:nth-child(8) { width:9%; }
      th:nth-child(9), td:nth-child(9) { width:18%; }
      .count,.stat-pill { white-space:nowrap; }
      .team-cell strong, .team-cell small, .scorer-cell { white-space:normal; overflow-wrap:anywhere; }
    }

    @media (max-width:680px) {
      .page { width:min(100% - 12px, 980px); padding-top:8px; }
      .masthead { transform:none; }
      .leaderboard { padding:14px 10px; }
      .leaderboard-head { display:block; }
      .updated { display:inline-block; margin-top:10px; white-space:normal; }
      th, td { padding:11px 10px; }
    }

    /* FIX MOBILE + FONT coerente con il gioco */
    :root { --display-font:"Bebas Neue","Arial Black",Impact,"Roboto Condensed","Arial Narrow",system-ui,sans-serif; --body-font:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif; }
    html { -webkit-text-size-adjust:100%; text-size-adjust:100%; overflow-x:hidden; }
    body { font-family:var(--body-font); overflow-x:hidden; }
    .masthead,h1,h2,.label,.back-btn,.refresh-btn,.btn,.updated,.rank,.count { font-family:var(--display-font); letter-spacing:.01em; }
    @media (max-width:680px) {
      .page { width:100%; padding:10px 10px calc(24px + env(safe-area-inset-bottom)); }
      .masthead { margin:0 -10px 12px; border-radius:0 0 18px 18px; min-height:52px; padding:12px 10px; font-size:clamp(24px,9vw,38px); line-height:1; letter-spacing:.015em; transform:none; }
      .actions { display:grid; grid-template-columns:1fr; gap:8px; }
      .back-btn,.refresh-btn,.btn { width:100%; min-height:46px; border-radius:15px; }
      .leaderboard,.card { border-radius:22px; padding:15px 12px; }
      .leaderboard-head { display:block; }
      h1 { font-size:clamp(34px,13vw,52px); letter-spacing:.005em; }
      h2 { font-size:17px; letter-spacing:.04em; }
      p,li { font-size:15px; line-height:1.45; }
      .updated { display:inline-block; white-space:normal; margin-top:10px; line-height:1.15; }
      .table-wrap { border-radius:16px; }
      table { min-width:920px; }
      th,td { padding:10px 8px; }
    }



    /* FIX DESKTOP FONT: mantieni il look precedente su PC, usa il display solo su mobile. */
    @media (min-width:901px) {
      body, .masthead, h1, h2, .label, .back-btn, .refresh-btn, .btn, .updated, .rank, .count {
        font-family:Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif !important;
      }
      .masthead { letter-spacing:.08em !important; }
      .label { letter-spacing:.24em !important; }
      h1 { letter-spacing:-.05em !important; }
      h2 { letter-spacing:.08em !important; }
      .back-btn, .refresh-btn, .btn { letter-spacing:.04em !important; }
      .updated { letter-spacing:.08em !important; }
    }

  </style>
</head>
<body>
  <main class="page">
    <div class="masthead"><span class="dot">●</span> Fantaballa World Cup</div>

    <div class="actions">
      <a class="back-btn" href="index.html">Torna al gioco</a>
      <a class="back-btn" href="privacy.html">Privacy</a>
      <button class="refresh-btn" id="refreshBtn" type="button">Aggiorna</button>
    </div>

    <section class="leaderboard" aria-label="Classifica completa">
      <div class="leaderboard-head">
        <div>
          <img class="logo" src="assets/fantaballa-logo.png" alt="Fantaballa" />
          <div class="label">Classifica</div>
          <h1>Campioni del mondo</h1>
          <p class="sub">Classifica ufficiale con risultati, modulo, OVR e miglior marcatore.</p>
        </div>
        <div id="leaderboardUpdated" class="updated">Caricamento classifica...</div>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Pos</th>
              <th>Squadra</th>
              <th>Vittorie</th>
              <th>Pareggi</th>
              <th>Sconfitte</th>
              <th>Gol fatti/subiti</th>
              <th>Modulo</th>
              <th>OVR medio</th>
              <th>Capocannoniere</th>
            </tr>
          </thead>
          <tbody id="leaderboardBody">
            <tr>
              <td><span class="rank">-</span></td>
              <td class="empty" colspan="8">In attesa del primo campione</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <script>
    (function () {
      const body = document.getElementById('leaderboardBody');
      const updated = document.getElementById('leaderboardUpdated');
      const refreshBtn = document.getElementById('refreshBtn');
      if (!body) return;

      const escape = value => String(value ?? '').replace(/[&<>'"]/g, ch => ({
        '&':'&amp;', '<':'&lt;', '>':'&gt;', "'":'&#039;', '"':'&quot;'
      }[ch]));

      const valueOf = (row, keys, fallback = '') => {
        for (const key of keys) {
          if (row && row[key] !== undefined && row[key] !== null && String(row[key]).trim() !== '') return row[key];
        }
        return fallback;
      };
      const numberOf = (row, keys, fallback = 0) => {
        const raw = valueOf(row, keys, fallback);
        const value = Number(raw);
        return Number.isFinite(value) ? value : fallback;
      };
      const nameOf = row => String(valueOf(row, ['squadra','nome_squadra','teamName','team_name','name'], '')).trim();
      const coachOf = row => String(valueOf(row, ['allenatore','coachName','coach_name','nome_allenatore','coach'], '')).trim();
      const winsOf = row => numberOf(row, ['vittorie','wins','campione_del_mondo','campioni_del_mondo','count'], 0);
      const drawsOf = row => numberOf(row, ['pareggi','draws'], 0);
      const lossesOf = row => numberOf(row, ['sconfitte','losses'], 0);
      const goalsTextOf = row => {
        const combined = valueOf(row, ['gol_fatti_subiti','golFattiSubiti','goals'], '');
        if (combined) return String(combined);
        const gf = valueOf(row, ['gol_fatti','golFatti','goalsFor','gf'], '');
        const ga = valueOf(row, ['gol_subiti','golSubiti','goalsAgainst','ga'], '');
        return gf !== '' || ga !== '' ? `${gf || 0}/${ga || 0}` : '—';
      };
      const ovrOf = row => {
        const value = valueOf(row, ['ovr_medio','OVR medio','avgOvr','averageOvr','overall'], '');
        if (value === '') return '—';
        const num = Number(value);
        return Number.isFinite(num) ? num.toLocaleString('it-IT', { maximumFractionDigits:1 }) : String(value);
      };
      const scorerOf = row => {
        const value = valueOf(row, ['capocannoniere','topScorer','top_scorer','miglior_marcatore'], '');
        if (!value) return '—';
        if (typeof value === 'object') {
          const name = value.nome || value.name || value.player || value.playerName || '—';
          const goals = value.gol ?? value.goals ?? value.reti;
          return goals !== undefined ? `${name} (${goals})` : String(name);
        }
        return String(value);
      };
      const moduleOf = row => String(valueOf(row, ['modulo','formation'], '—'));

      function renderLeaderboard(data) {
        const rows = Array.isArray(data) ? data : Array.isArray(data.classifica) ? data.classifica : [];
        const validRows = rows
          .map(row => ({
            name:nameOf(row),
            wins:winsOf(row),
            draws:drawsOf(row),
            losses:lossesOf(row),
            goals:goalsTextOf(row),
            module:moduleOf(row),
            ovr:ovrOf(row),
            scorer:scorerOf(row),
            coach:coachOf(row)
          }))
          .filter(row => row.name)
          .sort((a, b) => b.wins - a.wins || a.losses - b.losses || a.name.localeCompare(b.name, 'it'));

        if (!validRows.length) {
          body.innerHTML = '<tr><td><span class="rank">-</span></td><td class="empty" colspan="8">In attesa del primo campione</td></tr>';
        } else {
          body.innerHTML = validRows.map((row, index) => `<tr>
            <td><span class="rank">${index + 1}</span></td>
            <td class="team-cell"><strong>${escape(row.name)}</strong><small>${escape(row.coach || 'Allenatore non indicato')}</small></td>
            <td><span class="count">${escape(row.wins)}</span></td>
            <td><span class="stat-pill">${escape(row.draws)}</span></td>
            <td><span class="stat-pill">${escape(row.losses)}</span></td>
            <td><span class="stat-pill">${escape(row.goals)}</span></td>
            <td><span class="stat-pill">${escape(row.module)}</span></td>
            <td><span class="stat-pill">${escape(row.ovr)}</span></td>
            <td class="scorer-cell">${escape(row.scorer)}</td>
          </tr>`).join('');
        }

        if (updated) {
          const updatedText = data && data.aggiornato_il ? `Aggiornata: ${data.aggiornato_il}` : 'Classifica aggiornata';
          updated.textContent = updatedText;
        }
      }

      function loadLeaderboard() {
        if (updated) updated.textContent = 'Caricamento classifica...';
        fetch('data/classifica.json', { cache:'no-store' })
          .then(response => {
            if (!response.ok) throw new Error('classifica non trovata');
            return response.json();
          })
          .then(renderLeaderboard)
          .catch(() => {
            if (updated) updated.textContent = 'Classifica non disponibile';
            body.innerHTML = '<tr><td><span class="rank">-</span></td><td class="empty" colspan="8">Classifica non disponibile</td></tr>';
          });
      }

      refreshBtn.addEventListener('click', loadLeaderboard);
      loadLeaderboard();
    })();
  </script>
</body>
</html>
