<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Campionato del Ca*** · Fantaballa</title>
  <link rel="icon" href="favicon.ico">
  <style>
    :root{
      --navy:#10243a;--navy2:#173f66;--paper:#f4ecd8;--paper2:#fffaf0;--gold:#e4c84e;
      --red:#e34532;--green:#42c77a;--ink:#15120f;--muted:#6c6659;--line:#d8cba6;
      --shadow:0 18px 45px rgba(17,22,28,.18);
    }
    *{box-sizing:border-box} html{background:#13283d} body{margin:0;font-family:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,Arial,sans-serif;color:var(--navy);background:
      linear-gradient(rgba(10,25,42,.78),rgba(10,25,42,.9)),url('assets/macro-modes/season-bg.png') center/cover fixed;min-height:100vh}
    button,input,select{font:inherit} button{cursor:pointer}.hidden{display:none!important}
    .app{width:min(1180px,calc(100% - 22px));margin:0 auto;padding:16px 0 38px}
    .topbar{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:12px 16px;border-radius:22px;background:rgba(255,250,240,.96);border:2px solid var(--gold);box-shadow:var(--shadow);position:sticky;top:8px;z-index:20}
    .brand{display:flex;align-items:center;gap:12px;min-width:0}.brand img{width:48px;height:48px;object-fit:contain}.brand b{display:block;font-size:18px;text-transform:uppercase}.brand span{font-size:12px;font-weight:850;color:var(--muted)}
    .top-actions{display:flex;gap:8px;flex-wrap:wrap}.btn{border:2px solid var(--navy);border-radius:14px;background:#fff;color:var(--navy);padding:10px 14px;font-weight:950;box-shadow:0 4px 0 rgba(16,36,58,.14)}.btn:hover{transform:translateY(-1px)}.btn.primary{background:var(--navy);color:#fff}.btn.gold{background:var(--gold);color:var(--navy)}.btn.red{background:var(--red);color:#fff;border-color:#8f281e}.btn:disabled{opacity:.45;cursor:not-allowed;transform:none}
    .hero{margin:16px 0;padding:28px;border-radius:30px;background:linear-gradient(90deg,rgba(10,27,48,.93),rgba(10,27,48,.66)),url('assets/macro-modes/season-bg.png') center/cover;border:3px solid var(--gold);color:#fff;box-shadow:var(--shadow)}
    .hero-kicker{font-size:12px;font-weight:1000;letter-spacing:.18em;text-transform:uppercase;color:#ffe96c}.hero h1{margin:8px 0 10px;font-size:clamp(38px,7vw,78px);line-height:.88;text-transform:uppercase;letter-spacing:-.04em}.hero p{margin:0;max-width:760px;font-weight:850;line-height:1.45;color:#f9f3df}
    .panel{background:rgba(255,250,240,.97);border:2px solid var(--gold);border-radius:26px;padding:20px;box-shadow:var(--shadow);margin-top:16px}.panel h2,.panel h3{margin:0 0 12px;text-transform:uppercase}.label{font-size:11px;font-weight:1000;letter-spacing:.14em;text-transform:uppercase;color:#9b5b29}.field{display:grid;gap:6px}.field label{font-size:12px;font-weight:950}.field input{width:100%;border:2px solid #c9b985;border-radius:14px;background:#fffdf7;color:var(--navy);padding:12px 13px;font-weight:850}.setup-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.formation-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:12px}.formation-btn{border:2px solid #bba96e;border-radius:14px;background:#fffaf0;color:var(--navy);padding:12px 8px;font-weight:1000}.formation-btn.active{background:var(--navy);color:#fff;border-color:var(--navy)}
    .draft-layout{display:grid;grid-template-columns:minmax(0,1fr) 330px;gap:16px}.draft-head{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}.progress{height:12px;border-radius:999px;background:#d7cfbb;overflow:hidden}.progress span{display:block;height:100%;background:linear-gradient(90deg,var(--red),var(--gold));transition:.25s}.nation-card{margin-top:14px;padding:18px;border-radius:20px;background:linear-gradient(135deg,#173f66,#10243a);color:#fff}.nation-name{font-size:clamp(32px,6vw,58px);font-weight:1000;text-transform:uppercase}.need{font-size:13px;font-weight:900;color:#ffe96c;text-transform:uppercase;letter-spacing:.1em}.candidate-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-top:14px}.candidate{border:2px solid #bcae85;border-radius:18px;background:#fffdf7;padding:14px;text-align:left;color:var(--navy);box-shadow:0 6px 0 rgba(16,36,58,.08)}.candidate:hover{border-color:var(--red);transform:translateY(-2px)}.candidate .name{font-size:18px;font-weight:1000}.candidate .meta{display:flex;gap:8px;flex-wrap:wrap;margin-top:7px}.chip{display:inline-flex;padding:5px 8px;border-radius:999px;background:#e6edf4;color:var(--navy);font-size:11px;font-weight:950}.chip.sub{background:#d9c7ff}.ovr{margin-left:auto;background:var(--navy);color:#fff}.roster-list{display:grid;gap:7px}.roster-row{display:grid;grid-template-columns:44px minmax(0,1fr) auto;gap:10px;align-items:center;padding:9px;border-radius:14px;background:#fff;border:1px solid #ddd1ad}.slot-code{display:grid;place-items:center;width:40px;height:40px;border-radius:12px;background:var(--navy);color:#fff;font-size:12px;font-weight:1000}.roster-row b{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.roster-row small{display:block;color:var(--muted);font-weight:850}.bench .slot-code{background:#8f5b22}
    .dashboard-grid{display:grid;grid-template-columns:minmax(0,1fr) 340px;gap:16px}.season-strip{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}.stat{padding:12px;border-radius:16px;background:#fff;border:1px solid #ddd1ad;text-align:center}.stat b{display:block;font-size:26px}.stat span{font-size:10px;font-weight:1000;text-transform:uppercase;color:var(--muted)}
    .next-match{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:14px;padding:18px;border-radius:22px;background:linear-gradient(135deg,#143653,#225f8b);color:#fff;text-align:center}.team-name{font-size:clamp(20px,3vw,34px);font-weight:1000;text-transform:uppercase}.versus{font-size:36px;font-weight:1000;color:#ffe96c}.subline{font-size:12px;font-weight:850;color:#dce9f4}
    .event-card{padding:16px;border-radius:20px;background:#fff5bf;border:2px solid #d8b92d}.event-card.decision{background:#eadfff;border-color:#8e72d7}.event-card h3{margin-bottom:7px}.choice-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}.choice{border:2px solid var(--navy);border-radius:14px;background:#fff;padding:11px;text-align:left;font-weight:900;color:var(--navy)}
    .availability{display:grid;gap:8px}.availability-row{padding:10px;border-radius:14px;background:#fff;border-left:5px solid var(--red)}.availability-row b{display:block}.availability-row small{font-weight:850;color:var(--muted)}.availability-row .btn{margin-top:7px;padding:7px 10px;font-size:12px}
    .tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}.tab{border:0;border-radius:999px;background:#e8dfc8;color:var(--navy);padding:9px 13px;font-weight:1000}.tab.active{background:var(--navy);color:#fff}.tab-view{display:none}.tab-view.active{display:block}
    table{width:100%;border-collapse:collapse;background:#fff;border-radius:16px;overflow:hidden}th,td{padding:9px 8px;border-bottom:1px solid #e2dac5;text-align:right;font-size:13px;font-weight:800}th{background:#10243a;color:#fff;font-size:10px;text-transform:uppercase;letter-spacing:.08em}th:first-child,td:first-child{text-align:left}.us-row td{background:#fff3b2;font-weight:1000}.calendar{display:grid;gap:8px}.calendar-row{display:grid;grid-template-columns:70px 1fr auto;gap:10px;align-items:center;padding:10px;border-radius:14px;background:#fff;border:1px solid #ddd1ad}.calendar-row.current{border:3px solid var(--gold)}.calendar-row.done{opacity:.72}
    .match-result{padding:14px;border-radius:18px;background:#10243a;color:#fff}.score{font-size:52px;font-weight:1000;text-align:center}.goals{display:grid;gap:7px;margin-top:12px}.goal-line{padding:9px;border-radius:12px;background:rgba(255,255,255,.1)}
    .mid-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.outgoing-list{display:grid;gap:7px}.outgoing{border:2px solid #c8b98a;border-radius:14px;background:#fff;padding:10px;text-align:left}.outgoing.active{border-color:var(--red);background:#ffe7df}
    .final-hero{text-align:center;padding:28px;border-radius:24px;background:linear-gradient(135deg,#10243a,#214f77);color:#fff}.final-position{font-size:clamp(72px,13vw,140px);line-height:.8;font-weight:1000;color:#ffe96c}.final-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:16px}
    .modal-backdrop{position:fixed;inset:0;background:rgba(4,12,20,.76);display:grid;place-items:center;padding:18px;z-index:50}.modal{width:min(800px,100%);max-height:90vh;overflow:auto;background:#fffaf0;border:4px solid var(--gold);border-radius:28px;padding:22px;box-shadow:0 25px 80px rgba(0,0,0,.4)}.sim{height:12px;border-radius:999px;background:#ded5bc;overflow:hidden}.sim span{display:block;height:100%;background:linear-gradient(90deg,var(--green),var(--gold));animation:sim 1.2s linear forwards}@keyframes sim{from{width:0}to{width:100%}}
    .toast{position:fixed;left:50%;bottom:18px;transform:translate(-50%,20px);opacity:0;background:#10243a;color:#fff;padding:11px 16px;border:2px solid #fff;border-radius:14px;transition:.2s;z-index:80}.toast.show{opacity:1;transform:translate(-50%,0)}
    @media(max-width:900px){.draft-layout,.dashboard-grid{grid-template-columns:1fr}.season-strip{grid-template-columns:repeat(3,1fr)}.formation-grid{grid-template-columns:repeat(2,1fr)}}
    @media(max-width:620px){.app{width:min(100% - 10px,1180px)}.topbar{align-items:flex-start}.brand span{display:none}.setup-grid,.candidate-grid,.choice-grid,.mid-grid{grid-template-columns:1fr}.season-strip,.final-grid{grid-template-columns:repeat(2,1fr)}.hero{padding:20px}.panel{padding:14px}.next-match{grid-template-columns:1fr}.versus{font-size:24px}.calendar-row{grid-template-columns:60px 1fr}}
  

    /* DRAFT CAMPIONATO — STILE GARY MEDEL */
    .season-setup-card{
      background:linear-gradient(145deg,rgba(255,250,240,.98),rgba(242,229,194,.98));
      overflow:hidden;
      position:relative;
    }
    .season-setup-card::after{
      content:"GARY MEDEL RULES";
      position:absolute;right:-48px;top:23px;transform:rotate(8deg);
      padding:8px 58px;background:#7b4cb8;color:#fff;font-size:10px;font-weight:1000;letter-spacing:.15em;
    }
    .season-formation-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin:14px 0 18px}
    .season-formation-btn{border:2px solid #bba96e;border-radius:16px;background:#fffaf0;color:var(--navy);padding:13px 8px;font-weight:1000;box-shadow:0 4px 0 rgba(16,36,58,.1)}
    .season-formation-btn.active{background:linear-gradient(180deg,#8f60c9,#69409e);color:#fff;border-color:#55317f}
    .season-formation-btn small{display:block;margin-top:5px;font-size:9px;opacity:.75}

    .season-draft-page{display:grid;gap:14px}
    .season-draft-toolbar{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;padding:14px 16px;border:2px solid var(--gold);border-radius:22px;background:rgba(255,250,240,.97);box-shadow:var(--shadow)}
    .season-draft-toolbar h2{margin:0;font-size:clamp(23px,3vw,38px);line-height:.95}
    .season-draft-toolbar-actions{display:flex;gap:8px;flex-wrap:wrap}
    .season-draft-progress{height:12px;border-radius:999px;background:#d7cfbb;overflow:hidden;min-width:min(460px,70vw)}
    .season-draft-progress span{display:block;height:100%;background:linear-gradient(90deg,#7b4cb8,var(--gold));transition:.25s}

    .season-draft-shell{display:grid;grid-template-columns:390px minmax(430px,1fr) 310px;gap:14px;align-items:start}
    .season-draft-panel{background:rgba(255,250,240,.98);border:2px solid var(--gold);border-radius:26px;padding:15px;box-shadow:var(--shadow);min-width:0;align-self:start}
    .season-draw-card{padding:18px;border-radius:22px;background:linear-gradient(145deg,#46276d,#744caf 62%,#9c6bcf);color:#fff;border:2px solid #cba8ee;box-shadow:0 10px 25px rgba(51,29,80,.26)}
    .season-draw-code{display:inline-flex;padding:6px 9px;border-radius:999px;background:#ffe96c;color:#10243a;font-size:11px;font-weight:1000;letter-spacing:.14em}
    .season-draw-nation{margin:13px 0 4px;font-size:clamp(30px,4vw,48px);font-weight:1000;text-transform:uppercase;line-height:.92;overflow-wrap:anywhere}
    .season-draw-sub{font-size:12px;font-weight:900;color:#f1e7ff}
    .season-roll-btn{width:100%;margin-top:12px;border:0;border-radius:18px;padding:15px;background:linear-gradient(180deg,#ffe96c,#e2bb32);color:#10243a;font-size:20px;font-weight:1000;box-shadow:0 6px 0 #a87d14}
    .season-roll-btn:disabled{opacity:.55;cursor:not-allowed;box-shadow:none}
    .season-reroll-note{text-align:center;margin:10px 0 0;font-size:11px;font-weight:950;color:#6c5a80}
    .season-candidates-head{display:flex;justify-content:space-between;gap:10px;align-items:center;margin:16px 0 8px;font-size:12px;text-transform:uppercase;letter-spacing:.1em;font-weight:1000}
    .season-candidate-list{display:grid;gap:8px;max-height:none;overflow:visible;padding-right:0}
    .season-candidate{width:100%;display:grid;grid-template-columns:42px minmax(0,1fr) auto;gap:10px;align-items:center;border:2px solid var(--candidate-border,#d4c79d);border-radius:16px;background:var(--candidate-bg,#fffdf8);color:var(--candidate-text,#10243a);padding:9px;text-align:left;box-shadow:0 4px 0 rgba(16,36,58,.11);transition:transform .15s ease,border-color .15s ease,filter .15s ease,box-shadow .15s ease}
    .season-candidate:hover{filter:brightness(1.06);border-color:#ffe96c;transform:translateY(-2px);box-shadow:0 6px 0 rgba(16,36,58,.15)}
    .season-candidate.active{border-color:#ffe96c;outline:4px solid rgba(123,76,184,.28);box-shadow:0 7px 0 rgba(16,36,58,.18);transform:translateY(-2px)}
    .season-avatar{width:40px;height:40px;border-radius:13px;display:grid;place-items:center;background:var(--candidate-avatar-bg,linear-gradient(145deg,#173f66,#10243a));color:var(--candidate-avatar-text,#fff);font-size:12px;font-weight:1000;border:1px solid rgba(255,255,255,.3)}
    .season-candidate-name{color:inherit;font-weight:1000;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-shadow:var(--candidate-shadow,none)}
    .season-candidate-meta{display:flex;gap:5px;flex-wrap:wrap;margin-top:4px}
    .season-chip{display:inline-flex;padding:4px 7px;border-radius:999px;background:var(--candidate-chip-bg,rgba(230,237,244,.92));color:var(--candidate-chip-text,#10243a);font-size:9px;font-weight:1000;border:1px solid var(--candidate-chip-border,transparent)}
    .season-chip.position{background:var(--candidate-position-bg,rgba(231,216,248,.92));color:var(--candidate-position-text,#542b82)}
    .season-chip.sub{background:var(--candidate-sub-bg,rgba(217,199,255,.94));color:var(--candidate-sub-text,#402062)}
    .season-chip.ovr{min-width:40px;justify-content:center;background:var(--candidate-ovr-bg,#10243a);color:var(--candidate-ovr-text,#fff);font-size:13px;border:2px solid var(--candidate-ovr-border,rgba(255,255,255,.24));box-shadow:0 3px 8px rgba(0,0,0,.14)}
    .season-empty{padding:16px;border:2px dashed #cbbb88;border-radius:16px;text-align:center;color:#6c6659;font-weight:900;line-height:1.4}

    .season-pitch-panel{background:linear-gradient(180deg,rgba(17,48,65,.98),rgba(13,35,50,.98));border:3px solid var(--gold);border-radius:28px;padding:14px;box-shadow:var(--shadow)}
    .season-pitch-title{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px;color:#fff}
    .season-pitch-title b{text-transform:uppercase;letter-spacing:.08em}.season-pitch-title span{font-size:11px;font-weight:900;color:#f6df72}
    .season-pitch-wrap{position:relative;width:100%;aspect-ratio:100/120;max-height:700px;border-radius:24px;overflow:hidden;background:
      linear-gradient(90deg,rgba(255,255,255,.035) 50%,transparent 50%) 0 0/20% 100%,
      repeating-linear-gradient(0deg,#2d844d 0 10%,#287746 10% 20%);border:3px solid rgba(255,255,255,.8);box-shadow:inset 0 0 55px rgba(0,0,0,.2)}
    .season-pitch-svg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}
    .season-field-slot{position:absolute;transform:translate(-50%,-50%);width:78px;min-height:78px;border:0;background:transparent;color:#fff;display:grid;place-items:center;align-content:center;gap:4px;z-index:2}
    .season-field-slot .season-slot-badge{width:54px;height:54px;border-radius:50%;display:grid;place-items:center;background:rgba(10,28,43,.9);border:3px solid #fff;color:#fff;font-weight:1000;box-shadow:0 6px 14px rgba(0,0,0,.28)}
    .season-field-slot .season-slot-name{max-width:90px;padding:4px 7px;border-radius:999px;background:rgba(9,25,39,.9);font-size:10px;font-weight:1000;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .season-field-slot[data-position="P"]{z-index:4}
    .season-field-slot.available{cursor:pointer;animation:seasonSlotPulse .85s ease-in-out infinite alternate}
    .season-field-slot.available .season-slot-badge{background:#ffe96c;color:#10243a;border-color:#fff;box-shadow:0 0 0 7px rgba(255,233,108,.22),0 7px 18px rgba(0,0,0,.3)}
    .season-field-slot.filled .season-slot-badge{border-radius:14px;background:linear-gradient(180deg,#f5f0e4,#d4c59d);color:#10243a;border-color:#f8e46b;font-size:20px}
    .season-field-slot.filled .season-slot-name{background:#fff8d5;color:#10243a;border:1px solid #e4c84e}
    @keyframes seasonSlotPulse{to{transform:translate(-50%,-50%) scale(1.07)}}
    .season-pitch-help{margin:10px 0 0;color:#d9e7ee;text-align:center;font-size:12px;font-weight:900;line-height:1.35}

    .season-bench{margin-top:12px;padding:12px;border-radius:20px;background:linear-gradient(145deg,#3b2659,#5a397f);border:2px solid #d7b6f1;color:#fff}
    .season-bench-head{display:flex;justify-content:space-between;gap:10px;margin-bottom:9px;font-size:11px;font-weight:1000;text-transform:uppercase;letter-spacing:.1em}
    .season-bench-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}
    .season-bench-slot{min-height:84px;border:2px dashed rgba(255,255,255,.48);border-radius:16px;background:rgba(255,255,255,.08);color:#fff;padding:9px;display:grid;place-items:center;text-align:center;font-weight:1000}
    .season-bench-slot.available{cursor:pointer;background:#ffe96c;color:#10243a;border-style:solid;border-color:#fff;animation:seasonBenchPulse .85s ease-in-out infinite alternate}
    .season-bench-slot.filled{background:#fff8d5;color:#10243a;border-style:solid;border-color:#e4c84e}
    .season-bench-slot small{display:block;margin-top:4px;font-size:9px;opacity:.8}
    @keyframes seasonBenchPulse{to{transform:translateY(-3px)}}

    .season-box-score-head{display:flex;align-items:flex-end;justify-content:space-between;gap:10px;border-bottom:3px solid #10243a;padding-bottom:10px}
    .season-box-score-head strong{font-size:18px;text-transform:uppercase}.season-box-score-number{font-size:48px;line-height:.8;font-weight:1000;color:#7b4cb8}
    .season-summary-grid{display:grid;gap:8px;margin-top:12px}
    .season-summary-row{display:flex;justify-content:space-between;gap:10px;padding:9px 0;border-bottom:1px solid #ded4b9;font-size:12px;font-weight:900}.season-summary-row b{text-align:right}
    .season-roster-mini{display:grid;gap:6px;margin-top:12px;max-height:410px;overflow:auto}
    .season-roster-line{display:grid;grid-template-columns:42px minmax(0,1fr) auto;gap:8px;align-items:center;padding:8px;border-radius:13px;background:#fff;border:1px solid #ded4b9}
    .season-roster-line.bench{background:#f1e3ff}.season-roster-slot{display:grid;place-items:center;width:38px;height:38px;border-radius:11px;background:#10243a;color:#fff;font-size:10px;font-weight:1000}.season-roster-line.bench .season-roster-slot{background:#71479e}
    .season-roster-line b{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.season-roster-line small{display:block;color:#6c6659;font-size:9px;font-weight:850}.season-roster-ovr{font-weight:1000}
    .season-draft-complete{margin-top:13px;padding:13px;border-radius:17px;background:#e7f6dc;border:2px solid #69a446;text-align:center}.season-draft-complete h3{margin:0 0 6px}.season-draft-complete .btn{width:100%;margin-top:9px}

    .season-pack-card{width:min(620px,100%);padding:28px;border-radius:30px;background:linear-gradient(145deg,#3e2360,#7d4db8);border:5px solid #ffe96c;color:#fff;text-align:center;box-shadow:0 28px 90px rgba(0,0,0,.5)}
    .season-pack-card .pack-label{font-size:12px;font-weight:1000;letter-spacing:.2em;text-transform:uppercase;color:#ffe96c}.season-pack-card .pack-nation{margin:20px 0;font-size:clamp(44px,9vw,92px);line-height:.85;font-weight:1000;text-transform:uppercase;overflow-wrap:anywhere}.season-pack-card .pack-sub{font-weight:900;color:#eadcff}

    .season-pack-reveal{position:fixed;inset:0;display:none;align-items:center;justify-content:center;padding:24px;background:rgba(8,12,20,.56);backdrop-filter:blur(4px);z-index:120}
    .season-pack-reveal.show{display:flex}
    .season-pack-stage{position:relative;width:min(520px,100%);text-align:center}
    .season-pack-kicker{display:inline-flex;padding:8px 16px;border-radius:999px;background:#ffe96c;color:#10243a;font-size:13px;font-weight:1000;letter-spacing:.14em;text-transform:uppercase;box-shadow:0 10px 20px rgba(0,0,0,.18)}
    .season-pack-scene{position:relative;height:430px;display:grid;place-items:center;margin-top:16px}

    .season-pack-lid{position:absolute;left:-3px;right:-3px;top:-3px;height:120px;background:linear-gradient(180deg,#f6de68,#efd156);clip-path:polygon(0 0,100% 0,92% 54%,50% 78%,8% 54%);transform-origin:50% 10%;box-shadow:0 8px 16px rgba(0,0,0,.12)}

    .season-pack-seal{position:absolute;left:50%;top:132px;transform:translateX(-50%);width:74px;height:74px;border-radius:50%;display:grid;place-items:center;background:linear-gradient(180deg,#fff8d2,#f2ca54);color:#6b4309;border:4px solid rgba(255,255,255,.78);box-shadow:0 8px 18px rgba(0,0,0,.18);font-size:30px;font-weight:900}
    .season-pack-title-badge{position:absolute;top:108px;left:50%;transform:translateX(-50%) rotate(-6deg);background:#f5f3f0;color:#10243a;border:2px solid rgba(16,36,58,.14);border-radius:14px;padding:7px 16px;font-size:13px;font-weight:1000;letter-spacing:.04em;box-shadow:0 8px 20px rgba(0,0,0,.18)}
    .season-pack-reveal.opening .season-pack-envelope{animation:seasonPackShake .82s ease-in-out both}
    .season-pack-reveal.bursting .season-pack-envelope,.season-pack-reveal.show-result .season-pack-envelope{animation:seasonPackOpen .65s cubic-bezier(.17,.84,.28,1) forwards}
    .season-pack-reveal.bursting .season-pack-lid,.season-pack-reveal.show-result .season-pack-lid{animation:seasonPackLid .65s cubic-bezier(.17,.84,.28,1) forwards}
    .season-pack-nation-card{position:absolute;bottom:42px;width:206px;min-height:258px;border-radius:26px;padding:18px 16px 16px;background:radial-gradient(circle at 16% 12%, rgba(255,255,255,.86), transparent 0 18%, transparent 19%),linear-gradient(135deg, #7b4cb8 0 48%, #f0c85c 48% 78%, #fff8dd 78% 100%);border:6px solid #fff8dd;box-shadow:0 24px 42px rgba(0,0,0,.32),0 0 0 5px rgba(255,236,160,.22);color:#181512;opacity:0;transform:translateY(82px) rotateY(62deg) rotate(-5deg) scale(.78);backface-visibility:hidden;display:grid;align-content:space-between;gap:12px;overflow:hidden}
    .season-pack-nation-card::before{content:'';position:absolute;inset:12px;border-radius:20px;border:2px dashed rgba(255,255,255,.62);pointer-events:none}
    .season-pack-nation-card::after{content:'★ ★ ★';position:absolute;left:50%;bottom:13px;transform:translateX(-50%);color:rgba(255,255,255,.76);font-size:14px;letter-spacing:.34em;text-shadow:0 1px 2px rgba(0,0,0,.18)}
    .season-pack-reveal.show-result .season-pack-nation-card{animation:seasonPackFinalCard .75s cubic-bezier(.16,1,.22,1) forwards}
    .season-pack-card-label{position:relative;z-index:1;justify-self:start;padding:5px 9px;border-radius:999px;background:rgba(255,255,255,.88);color:#2b2116;font-size:11px;font-weight:900;letter-spacing:.16em;text-transform:uppercase}
    .season-pack-code{position:relative;z-index:1;justify-self:center;width:86px;height:86px;border-radius:50%;display:grid;place-items:center;background:rgba(255,255,255,.92);color:#251b12;border:4px solid rgba(255,255,255,.82);box-shadow:0 10px 18px rgba(0,0,0,.16);font-size:30px;font-weight:1000}
    .season-pack-name{position:relative;z-index:1;font-size:34px;line-height:.92;font-weight:1000;text-transform:uppercase;overflow-wrap:anywhere}

    @keyframes seasonPackShake{0%,100%{transform:translateY(0) rotate(0)}18%{transform:translateY(-5px) rotate(-3deg)}38%{transform:translateY(4px) rotate(4deg)}60%{transform:translateY(-3px) rotate(-2deg)}82%{transform:translateY(3px) rotate(2deg)}}

    @keyframes seasonPackLid{0%{transform:rotate(0)}100%{transform:rotate(-24deg) translate(-18px,-28px);opacity:0}}
    @keyframes seasonPackCardRise{0%{opacity:0;transform:translateY(70px) rotate(var(--card-rot,0deg)) scale(.84)}100%{opacity:1;transform:translateY(-6px) rotate(var(--card-rot,0deg)) scale(1)}}
    @keyframes seasonPackFinalCard{0%{opacity:0;transform:translateY(82px) rotateY(62deg) rotate(-5deg) scale(.78)}100%{opacity:1;transform:translateY(-8px) rotateY(0deg) rotate(0deg) scale(1)}}

    /* RESTYLE CAMPIONATO — LOOK MEDel */
    :root{

<body>
<div class="app">
  <header class="topbar">
    <div class="brand"><img src="assets/fantaballa-logo.png" alt="Fantaballa"><div><b>Campionato del Ca***</b><span>Una stagione · 38 giornate · Regole Gary MEDel</span></div></div>
    <div class="top-actions"><a class="btn" href="index.html">Menu modalità</a><button id="resetBtn" class="btn red" type="button">Azzera stagione</button></div>
  </header>
  <section class="hero"><div class="hero-kicker">Modalità stagione</div><h1>Campionato del Ca***</h1><p>Draft iniziale, 11 titolari e 3 panchinari. Posizioni precise, infortuni, squalifiche, eventi e decisioni casuali. Dopo la giornata 19 puoi cambiare due giocatori.</p></section>
  <main id="screen"></main>
</div>
<div id="modalRoot"></div><div id="toast" class="toast"></div>
<script>
const SAVE_KEY='fantaballa_campionato_v1';
const VICTORY_ENDPOINT='https://script.google.com/macros/s/AKfycbwadjpez_e-IXMLupqpISLEZ3rrHhrtF9gk_E9v9HB_YcgkXUneOnrW7iYAdGjqz3_G/exec';
const USER_ID='fantaballa-xi';
const FORMATIONS={
 '4-3-3':['AS','ATT','AD','CC','CDC','CC','TS','DC','DC','TD','P'],
 '4-4-2':['ATT','ATT','AS','CC','CC','AD','TS','DC','DC','TD','P'],
 '4-2-3-1':['ATT','AS','COC','AD','CDC','CDC','TS','DC','DC','TD','P'],
 '4-5-1':['ATT','AS','COC','AD','CC','CC','TS','DC','DC','TD','P'],
 '3-5-2':['ATT','ATT','AS','COC','AD','CC','CDC','DC','DC','DC','P'],
 '5-3-2':['ATT','ATT','CC','CDC','CC','TS','DC','DC','DC','TD','P'],
 '3-4-3':['AS','ATT','AD','AS','CC','CC','AD','DC','DC','DC','P'],
 '4-3-1-2':['ATT','ATT','COC','CC','CDC','CC','TS','DC','DC','TD','P']
};

const FORMATION_LAYOUTS={
 '4-3-3':[['AS',18,18],['ATT',50,13],['AD',82,18],['CC',28,46],['CDC',50,56],['CC',72,46],['TS',12,80],['DC',38,85],['DC',62,85],['TD',88,80],['P',50,93]],
 '4-4-2':[['ATT',35,17],['ATT',65,17],['AS',13,45],['CC',37,53],['CC',63,53],['AD',87,45],['TS',12,80],['DC',38,85],['DC',62,85],['TD',88,80],['P',50,93]],
 '4-2-3-1':[['ATT',50,13],['AS',17,37],['COC',50,34],['AD',83,37],['CDC',36,58],['CDC',64,58],['TS',12,81],['DC',38,86],['DC',62,86],['TD',88,81],['P',50,93]],
 '4-5-1':[['ATT',50,13],['AS',12,39],['COC',50,34],['AD',88,39],['CC',34,56],['CC',66,56],['TS',12,81],['DC',38,86],['DC',62,86],['TD',88,81],['P',50,93]],
 '3-5-2':[['ATT',35,16],['ATT',65,16],['AS',10,43],['COC',50,35],['AD',90,43],['CC',34,58],['CDC',66,58],['DC',24,84],['DC',50,88],['DC',76,84],['P',50,93]],
 '5-3-2':[['ATT',35,16],['ATT',65,16],['CC',28,49],['CDC',50,58],['CC',72,49],['TS',8,78],['DC',28,86],['DC',50,89],['DC',72,86],['TD',92,78],['P',50,93]],
 '3-4-3':[['AS',18,18],['ATT',50,13],['AD',82,18],['AS',13,48],['CC',40,55],['CC',60,55],['AD',87,48],['DC',24,84],['DC',50,88],['DC',76,84],['P',50,93]],
 '4-3-1-2':[['ATT',35,15],['ATT',65,15],['COC',50,35],['CC',28,54],['CDC',50,61],['CC',72,54],['TS',12,82],['DC',38,87],['DC',62,87],['TD',88,82],['P',50,93]]
};
const POSITION_ROLE={P:'P',DC:'D',TS:'D',TD:'D',CDC:'C',CC:'C',COC:'C',AS:'A',AD:'A',ATT:'A'};
let PLAYERS=[];let COMMENTARY=null;let state=loadState()||freshState();let draftRolling=false;
const screen=document.getElementById('screen'),modalRoot=document.getElementById('modalRoot'),toastEl=document.getElementById('toast');
function freshState(){return{version:1,phase:'setup',teamName:'',coachName:'',formation:'4-3-3',draft:{roster:[],nation:'',candidates:[],rerolls:3,pendingPlayerId:''},teams:[],schedule:[],standings:{},matchday:0,history:[],statuses:{},playInjured:{},pendingEvent:null,activeEffects:[],stats:{goals:{},assists:{}},midseason:{step:0,outgoingId:'',nation:'',candidates:[]},lastResult:null,submitted:false};}
function loadState(){try{return JSON.parse(localStorage.getItem(SAVE_KEY)||'null')}catch{return null}}
function save(){localStorage.setItem(SAVE_KEY,JSON.stringify(state))}
function esc(v){return String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function shuffle(a){return [...a].sort(()=>Math.random()-.5)}function pick(a){return a[Math.floor(Math.random()*a.length)]}function clamp(n,a,b){return Math.max(a,Math.min(b,n))}
function toast(msg){toastEl.textContent=msg;toastEl.classList.add('show');clearTimeout(toast._t);toast._t=setTimeout(()=>toastEl.classList.remove('show'),2200)}
function positions(p){return String(p.Position||p.position||p.role||'').split(',').map(x=>x.trim().toUpperCase()).filter(Boolean)}
function compatible(p,code){return positions(p).includes(code)}
function roleOf(p){return p.role||POSITION_ROLE[positions(p)[0]]||'C'}
function playerById(id){return PLAYERS.find(p=>String(p.id)===String(id))}
function rosterEntry(id){return state.draft.roster.find(r=>String(r.playerId)===String(id))}
function rosterPlayers(){return state.draft.roster.map(r=>({...r,player:r.player||playerById(r.playerId)})).filter(r=>r.player)}
function avg(arr){return arr.length?arr.reduce((s,n)=>s+n,0)/arr.length:0}
function normalizeName(s){return String(s||'').trim().toLowerCase().replace(/[^a-z0-9à-ÿ]+/g,'')}
function statusOf(id){if(!state.statuses[id])state.statuses[id]={injury:0,suspension:0};return state.statuses[id]}

function normalizeCampionatoState(input){
 const next=input&&typeof input==='object'?input:freshState();
 if(!next.draft||typeof next.draft!=='object')next.draft=freshState().draft;
 next.draft.roster=Array.isArray(next.draft.roster)?next.draft.roster:[];
 next.draft.nation=String(next.draft.nation||'');
 next.draft.candidates=Array.isArray(next.draft.candidates)?next.draft.candidates.map(String):[];
 next.draft.pendingPlayerId=String(next.draft.pendingPlayerId||'');
 next.draft.rerolls=Math.max(0,Math.min(3,Number.isFinite(Number(next.draft.rerolls))?Number(next.draft.rerolls):3));
 const layouts=formationSlots(next.formation||'4-3-3');
 const used=new Set();
 next.draft.roster.forEach((entry,index)=>{
   entry.playerId=String(entry.playerId||entry.player?.id||'');
   entry.bench=Boolean(entry.bench||String(entry.slot||'').startsWith('PAN'));
   if(entry.bench){entry.slot=entry.slot||`PAN${Math.min(3,index+1)}`;entry.slotId=entry.slotId||`bench-${String(entry.slot).replace(/\D/g,'')||1}`;return}
   let found=layouts.find(slot=>slot.instanceId===entry.slotId&&!used.has(slot.instanceId));
   if(!found)found=layouts.find(slot=>slot.code===entry.slot&&!used.has(slot.instanceId));
   if(!found)found=layouts.find(slot=>!used.has(slot.instanceId));
   if(found){entry.slotId=found.instanceId;entry.slot=found.code;used.add(found.instanceId)}
 });
 return next;
}
function formationSlots(key=state.formation){return (FORMATION_LAYOUTS[key]||FORMATION_LAYOUTS['4-3-3']).map((row,index)=>({code:row[0],x:row[1],y:row[2],instanceId:`starter-${index}`}))}
function starterEntries(){return rosterPlayers().filter(r=>!r.bench)}
function benchEntries(){return rosterPlayers().filter(r=>r.bench)}
function draftComplete(){return starterEntries().length>=11&&benchEntries().length>=3}
function benchDraftPhase(){return starterEntries().length>=11}
function usedDraftPlayerIds(){return new Set(state.draft.roster.map(r=>String(r.playerId)))}
function occupiedStarterSlotIds(){return new Set(state.draft.roster.filter(r=>!r.bench).map(r=>String(r.slotId)))}
function openStarterSlots(){const used=occupiedStarterSlotIds();return formationSlots().filter(slot=>!used.has(slot.instanceId))}
function availableStarterSlotsForPlayer(player){return openStarterSlots().filter(slot=>compatible(player,slot.code))}
function draftPlayerIsValid(player){if(!player||usedDraftPlayerIds().has(String(player.id)))return false;return benchDraftPhase()?benchEntries().length<3:availableStarterSlotsForPlayer(player).length>0}
function draftCandidatesForNation(nation){return PLAYERS.filter(p=>p.nation===nation&&draftPlayerIsValid(p)).sort((a,b)=>{const pa=positions(a)[0]||'',pb=positions(b)[0]||'';return pa.localeCompare(pb,'it')||(Number(b.ovr)||0)-(Number(a.ovr)||0)||String(a.name).localeCompare(String(b.name),'it')})}
function draftPossibleNations(){const grouped={};PLAYERS.forEach(p=>{if(draftPlayerIsValid(p))(grouped[p.nation]??=[]).push(p)});return Object.keys(grouped).filter(Boolean)}
function playerInitials(name){return String(name||'?').split(/\s+/).filter(Boolean).slice(0,2).map(x=>x[0]).join('').toUpperCase()||'?'}
function formationPositionSummary(key){const counts={};(FORMATIONS[key]||[]).forEach(code=>counts[code]=(counts[code]||0)+1);return Object.entries(counts).map(([code,count])=>count>1?`${code}×${count}`:code).join(' · ')}
function draftAverageOvr(){const list=rosterPlayers();return list.length?avg(list.map(r=>Number(r.player.ovr)||0)):0}
function draftSubscriberCount(){return rosterPlayers().filter(r=>String(r.player.subscriber).toLowerCase()==='si').length}
function remainingSlotSummary(){const counts={};openStarterSlots().forEach(slot=>counts[slot.code]=(counts[slot.code]||0)+1);return Object.entries(counts).map(([code,count])=>count>1?`${code}×${count}`:code).join(' · ')||'Completati'}
function waitDraft(ms){return new Promise(resolve=>setTimeout(resolve,ms))}

function isSubscriber(player){return String(player&&player.subscriber||'').trim().toLowerCase()==='si'}
function hashString(str){let h=2166136261>>>0;for(const ch of String(str||'')){h^=ch.charCodeAt(0);h=Math.imul(h,16777619)}return h>>>0}
function seededChoice(list,seed,shift=0){return list[(Math.floor(seed/Math.pow(7,shift))>>>0)%list.length]}
function avatarSeed(player){const seed=hashString(`${player?.name||''}|${player?.nation||''}|${player?.role||''}`);return {
  skin:seededChoice(['#f4c7a1','#e3a97e','#c8845d','#8e5a3d','#f0bf9a'],seed,1),
  hair:seededChoice(['#201715','#4b2f1f','#cf9b2e','#a11f1f','#d9d9d9','#111827'],seed,2),
  shirtA:seededChoice(['#e74c3c','#355cde','#2e7d32','#7b4cb8','#f3be31','#0f1727','#d94b35'],seed,3),
  shirtB:seededChoice(['#ffffff','#d7e4ff','#ffe08a','#f6f0d8','#79b0ff','#f4d56c','#d9a514'],seed,4),
  shirtC:seededChoice(['#10243a','#ffffff','#0a1825','#e9eef6','#173a58','#2e2151'],seed,5),
  faceClass:seededChoice(['round','oval','square'],seed,6),
  hairClass:seededChoice(['hair-short','hair-top','hair-full','hair-side'],seed,7),
  extraClass:seededChoice(['extra-none','extra-brow','extra-beard'],seed,8)
 }}
function renderMiniAvatar(player,extra=''){
 const a=avatarSeed(player);
 const sub=isSubscriber(player);
 return `<span class="season-mini-avatar ${a.faceClass} ${a.hairClass} ${a.extraClass} ${sub?'subscriber':''} ${extra}" style="--skin:${a.skin};--hair:${a.hair};--shirt-a:${a.shirtA};--shirt-b:${a.shirtB};--shirt-c:${a.shirtC}"><span class="av-head"></span><span class="av-hair"></span><span class="av-eye av-eye-l"></span><span class="av-eye av-eye-r"></span><span class="av-mouth"></span><span class="av-extra"></span><span class="av-neck"></span><span class="av-body"></span>${sub?'<span class="av-subscriber-badge">★</span>':''}</span>`
}
function nationPalette(name){
 const seed=hashString(name||'nation');
 const hue=seed%360; const hue2=(hue+((seed>>4)%90)+30)%360; const hue3=(hue+((seed>>7)%170)+110)%360;
 const a=`hsl(${hue} 72% 56%)`; const b=`hsl(${hue2} 68% 42%)`; const c=`hsl(${hue3} 82% 92%)`;
 const ink=((seed>>10)%2)?'#10243a':'#1d160e';
 return {a,b,c,ink}
}
function renderPlayerJersey(player,extra=''){
 const pal=nationPalette(player?.nation||''); const sub=isSubscriber(player); const shownOvr=Math.round(Number(player?.ovr)||0);
 return `<span class="season-jersey-wrap ${sub?'subscriber':''} ${extra}" style="--nation-a:${pal.a};--nation-b:${pal.b};--nation-c:${pal.c};--nation-ink:${pal.ink}"><span class="season-jersey"><span class="season-jersey-number">${shownOvr}</span></span>${sub?'<span class="season-jersey-sub-star">★</span>':''}</span>`
}

function showSetup(){screen.innerHTML=`<section class="panel season-setup-card"><div class="season-setup-kicker">Campionato del Ca***</div><h2>Crea la tua squadra</h2><p class="season-setup-copy">Stesso feeling grafico di Gary MEDel, ma con tutte le meccaniche del campionato: 11 titolari, 3 riserve, eventi, infortuni, squalifiche e draft di metà stagione.</p><div class="setup-grid"><div class="field"><label>Nome squadra</label><input id="teamName" maxlength="32" value="${esc(state.teamName)}" placeholder="Fantaballa FC"></div><div class="field"><label>Allenatore</label><input id="coachName" maxlength="32" value="${esc(state.coachName)}" placeholder="Il tuo nome"></div></div><div class="season-setup-tip">Se il nome allenatore coincide con quello di un calciatore scelto, quel giocatore ottiene +10 OVR bonus di intesa.</div><h3 style="margin-top:20px">Scegli il modulo</h3><div class="season-formation-grid">${Object.keys(FORMATIONS).map(f=>`<button class="season-formation-btn ${state.formation===f?'active':''}" data-form="${f}">${f}<small>${esc(formationPositionSummary(f))}</small></button>`).join('')}</div><div class="season-setup-tip secondary"><b>Meccanica Gary MEDel:</b> estrai una nazionale, scegli un giocatore e piazzalo esclusivamente in uno slot compatibile con la sua <code>Position</code>. Dopo gli 11 titolari drafterai anche 3 riserve.</div><button id="startDraft" class="btn primary season-start-btn">Inizia il draft Gary MEDel</button></section>`;
 document.querySelectorAll('[data-form]').forEach(b=>b.onclick=()=>{state.formation=b.dataset.form;save();showSetup()});
 document.getElementById('startDraft').onclick=()=>{state.teamName=document.getElementById('teamName').value.trim()||'Fantaballa FC';state.coachName=document.getElementById('coachName').value.trim()||'Mister';state.phase='draft';state.draft=freshState().draft;save();render()}
}

async function playSeasonPackReveal(possibleNations,finalNation,isReroll){
 modalRoot.innerHTML=`<div class="season-pack-reveal" id="seasonPackReveal"><div class="season-pack-stage" role="dialog" aria-live="assertive" aria-label="Apertura pacchetto nazionale campionato"><div class="season-pack-kicker">Campionato Pack</div><div class="season-pack-scene" aria-hidden="true"><div class="season-pack-burst"></div><div class="season-pack-card-stack"><div class="season-pack-card-back"></div><div class="season-pack-card-back"></div><div class="season-pack-card-back"></div></div><div class="season-pack-nation-card" id="seasonPackNationCard"><div class="season-pack-card-label" id="seasonPackCardLabel">${isReroll?'Second chance':'National draft'}</div><div class="season-pack-code" id="seasonPackCode">--</div><div class="season-pack-name" id="seasonPackNation">???</div></div><div class="season-pack-envelope" id="seasonPackEnvelope"><div class="season-pack-lid"></div><div class="season-pack-tear"></div><div class="season-pack-title-badge">FANTABALLA</div><div class="season-pack-seal">⚽</div></div></div><div class="season-pack-caption" id="seasonPackCaption">Scarta il pacchetto...</div></div></div>`;
 const overlay=document.getElementById('seasonPackReveal');
 const label=document.getElementById('seasonPackNation');
 const code=document.getElementById('seasonPackCode');
 const caption=document.getElementById('seasonPackCaption');
 const cardLabel=document.getElementById('seasonPackCardLabel');
 cardLabel.textContent=isReroll?'Second chance':'National draft';
 overlay.classList.add('show');
 void overlay.offsetWidth;
 overlay.classList.add('opening');
 for(let i=0;i<10;i++){
   const nation=pick(possibleNations)||'???';
   label.textContent=nation;
   code.textContent=nation.slice(0,2).toUpperCase();
   caption.innerHTML=i<4?'Strappa il bordo...':i<8?'Le figurine stanno uscendo...':'Reveal finale...';
   await waitDraft(80+i*14)
 }
 overlay.classList.remove('opening');
 overlay.classList.add('bursting');
 await waitDraft(360);
 label.textContent=finalNation;
 code.textContent=finalNation.slice(0,2).toUpperCase();
 overlay.classList.add('show-result');
 caption.innerHTML=`<strong>${esc(finalNation)}</strong> è la nazionale pescata`;
 await waitDraft(1180);
 modalRoot.innerHTML='';
}
async function drawDraft(useReroll=false){
 if(draftRolling||draftComplete())return;
 if(useReroll){if(state.draft.rerolls<=0)return toast('Re-roll terminati');state.draft.rerolls--}
 const possibleBase=draftPossibleNations();
 const possible=useReroll&&possibleBase.length>1?possibleBase.filter(n=>n!==state.draft.nation):possibleBase;
 if(!possible.length)return toast('Non ci sono più giocatori validi per gli slot rimasti.');
 const finalNation=pick(possible);
 draftRolling=true;state.draft.pendingPlayerId='';state.draft.candidates=[];save();render();
 await playSeasonPackReveal(possible,finalNation,useReroll);
 state.draft.nation=finalNation;state.draft.candidates=draftCandidatesForNation(finalNation).map(p=>String(p.id));draftRolling=false;save();render();
}
function selectDraftCandidate(id){if(draftRolling||draftComplete())return;const p=playerById(id);if(!draftPlayerIsValid(p))return toast('Giocatore non compatibile con gli slot rimasti.');state.draft.pendingPlayerId=state.draft.pendingPlayerId===String(id)?'':String(id);save();render()}
function placeDraftStarter(slotId){const player=playerById(state.draft.pendingPlayerId),slot=formationSlots().find(s=>s.instanceId===slotId);if(!player||!slot||!availableStarterSlotsForPlayer(player).some(s=>s.instanceId===slotId))return;state.draft.roster.push({playerId:String(player.id),slotId:slot.instanceId,slot:slot.code,bench:false,player:{...player}});finishDraftPlacement()}
function placeDraftBench(slotId){if(!benchDraftPhase())return toast('Completa prima gli 11 titolari.');const player=playerById(state.draft.pendingPlayerId);if(!player||usedDraftPlayerIds().has(String(player.id)))return;const index=Number(String(slotId).replace(/\D/g,''));if(!index||state.draft.roster.some(r=>r.bench&&r.slotId===slotId))return;state.draft.roster.push({playerId:String(player.id),slotId,slot:`PAN${index}`,bench:true,player:{...player}});finishDraftPlacement()}
function finishDraftPlacement(){state.draft.pendingPlayerId='';state.draft.nation='';state.draft.candidates=[];save();render();if(draftComplete())toast('Rosa completa: 11 titolari + 3 riserve.')}
function resetSeasonDraft(){if(!confirm('Azzerare il draft mantenendo squadra, allenatore e modulo?'))return;state.draft=freshState().draft;save();render()}
function backToSeasonSetup(){if(state.draft.roster.length&&!confirm('Tornare alla scelta del modulo e cancellare il draft?'))return;state.phase='setup';state.draft=freshState().draft;save();render()}

function renderSeasonPitch(){
 const assigned=new Map(starterEntries().map(r=>[String(r.slotId),r]));
 const pending=playerById(state.draft.pendingPlayerId);
 const available=new Set(pending&&!benchDraftPhase()?availableStarterSlotsForPlayer(pending).map(s=>s.instanceId):[]);
 return `<div class="season-pitch-panel"><div class="season-pitch-title"><b>Formazione ${esc(state.formation)}</b><span>Regole Gary MEDel · Position precise</span></div><div class="season-pitch-wrap"><svg class="season-pitch-svg" viewBox="0 0 100 120" preserveAspectRatio="none" aria-hidden="true"><rect x="1" y="1" width="98" height="118" fill="none" stroke="rgba(255,255,255,.8)" stroke-width=".8"/><rect x="21" y="1" width="58" height="18" fill="none" stroke="rgba(255,255,255,.75)" stroke-width=".6"/><rect x="34" y="1" width="32" height="8" fill="none" stroke="rgba(255,255,255,.75)" stroke-width=".55"/><rect x="21" y="101" width="58" height="18" fill="none" stroke="rgba(255,255,255,.75)" stroke-width=".6"/><rect x="34" y="111" width="32" height="8" fill="none" stroke="rgba(255,255,255,.75)" stroke-width=".55"/><line x1="1" y1="60" x2="99" y2="60" stroke="rgba(255,255,255,.75)" stroke-width=".55"/><circle cx="50" cy="60" r="12" fill="none" stroke="rgba(255,255,255,.75)" stroke-width=".55"/></svg>${formationSlots().map(slot=>{const entry=assigned.get(slot.instanceId),isAvailable=available.has(slot.instanceId);const sub=entry&&isSubscriber(entry.player);return `<button type="button" class="season-field-slot ${entry?'filled':''} ${isAvailable?'available':''} ${sub?'subscriber-player':''}" data-starter-slot="${slot.instanceId}" data-position="${slot.code}" style="left:${slot.x}%;top:${slot.y}%">${entry?`${renderPlayerJersey(entry.player)}<span class="season-slot-name">${sub?'<span class="season-field-sub-star">★</span>':''}${esc(entry.player.name)}</span><span class="season-slot-role">${esc(slot.code)}</span>`:`<span class="season-slot-badge">${esc(slot.code)}</span><span class="season-slot-name">${esc(slot.code)}</span>`}</button>`}).join('')}</div><div class="season-pitch-help">${pending&&!benchDraftPhase()?`Hai scelto <b>${esc(pending.name)}</b>: clicca uno degli slot illuminati compatibili con ${esc(pending.Position)}.`:benchDraftPhase()?'Gli 11 titolari sono completi. Ora seleziona tre riserve.':'Rolla una nazionale, scegli un giocatore e poi clicca lo slot illuminato.'}</div>${renderSeasonBench()}</div>`
}

function nationalStrength(nation){const ps=PLAYERS.filter(p=>p.nation===nation).sort((a,b)=>b.ovr-a.ovr).slice(0,11);return Math.round(avg(ps.map(p=>Number(p.ovr)||70))*10)/10}
function finalizeDraft(){if(!draftComplete())return toast('Completa 11 titolari e 3 riserve.');state.draft.pendingPlayerId='';const counts={};PLAYERS.forEach(p=>counts[p.nation]=(counts[p.nation]||0)+1);const nations=Object.keys(counts).sort((a,b)=>counts[b]-counts[a]).slice(0,19);state.teams=[{id:USER_ID,name:state.teamName,strength:teamPowerBase()}].concat(nations.map((n,i)=>({id:`nat-${i}`,name:n,strength:nationalStrength(n)})));state.schedule=generateSchedule(state.teams.map(t=>t.id));state.standings={};state.teams.forEach(t=>state.standings[t.id]={id:t.id,name:t.name,p:0,w:0,d:0,l:0,gf:0,ga:0,pts:0});state.phase='season';state.matchday=0;state.pendingEvent=null;state.draft.candidates=[];save();prepareEvent();render()}
function generateSchedule(ids){let arr=[...ids],rounds=[];for(let r=0;r<arr.length-1;r++){let matches=[];for(let i=0;i<arr.length/2;i++){let h=arr[i],a=arr[arr.length-1-i];if(r%2&&i===0)[h,a]=[a,h];matches.push({home:h,away:a})}rounds.push(matches);arr=[arr[0],arr[arr.length-1],...arr.slice(1,-1)]}return rounds.concat(rounds.map(rd=>rd.map(m=>({home:m.away,away:m.home}))));}
function sortedTable(){return Object.values(state.standings).sort((a,b)=>b.pts-a.pts||((b.gf-b.ga)-(a.gf-a.ga))||b.gf-a.gf||b.w-a.w)}
function userStanding(){return state.standings[USER_ID]}
function teamById(id){return state.teams.find(t=>t.id===id)}
function currentRound(){return state.schedule[state.matchday]||[]}
function userFixture(){return currentRound().find(m=>m.home===USER_ID||m.away===USER_ID)}
function getStarterEntries(){return rosterPlayers().filter(r=>!r.bench)}function getBenchEntries(){return rosterPlayers().filter(r=>r.bench)}
function chemistryBase(player,list){const same=list.filter(o=>o.playerId!==player.id&&o.nation===player.nation).length;const sameRole=list.filter(o=>o.playerId!==player.id&&o.nation===player.nation&&roleOf(o)===roleOf(player)).length;let v=Math.min(6,same+sameRole);if(String(player.subscriber).toLowerCase()==='si')v+=5;const subs=list.filter(o=>o.nation===player.nation&&String(o.subscriber).toLowerCase()==='si').length;if(String(player.subscriber).toLowerCase()==='si'&&subs>=2)v+=10;if(normalizeName(player.name)===normalizeName(state.coachName))v+=10;return v}
function activeEffectBonus(player){let v=0;state.activeEffects.forEach(e=>{if(e.type==='teamChem')v+=e.value;if(e.type==='teamOvr')v+=e.value;if(e.type==='subscriberChem'&&String(player.subscriber).toLowerCase()==='si')v+=e.value;if(e.type==='playerChem'&&String(e.playerId)===String(player.id))v+=e.value});return v}
function resolveLineup(){const starters=getStarterEntries(),bench=getBenchEntries(),used=new Set(),out=[];for(const entry of starters){const p=entry.player,st=statusOf(p.id);if(st.suspension>0||(st.injury>0&&!state.playInjured[p.id])){const available=bench.filter(b=>!used.has(b.playerId)&&statusOf(b.playerId).injury<=0&&statusOf(b.playerId).suspension<=0);let sub=available.find(b=>compatible(b.player,entry.slot));if(!sub)sub=available.find(b=>roleOf(b.player)===POSITION_ROLE[entry.slot]);if(!sub)sub=available[0];if(sub){used.add(sub.playerId);out.push({...sub,slot:entry.slot,malus:compatible(sub.player,entry.slot)?0:-10,replaces:p.name})}else{out.push({playerId:`youth-${entry.slot}`,slot:entry.slot,bench:false,malus:-10,replaces:p.name,player:{id:`youth-${entry.slot}`,name:`Primavera ${entry.slot}`,nation:'Academy',Position:entry.slot,role:POSITION_ROLE[entry.slot],ovr:60,subscriber:'no'}})}}else out.push({...entry,malus:st.injury>0?-20:0,replaces:''})}return out}
function teamPowerBase(){const list=getStarterEntries().map(r=>r.player);return avg(list.map(p=>Number(p.ovr)||70))}
function matchPower(){const line=resolveLineup(),players=line.map(x=>x.player);let total=0;line.forEach(e=>{total+=(Number(e.player.ovr)||60)+(chemistryBase(e.player,players)/5)+e.malus+activeEffectBonus(e.player)});return total/11}

function prepareEvent(){if(state.phase!=='season'||state.pendingEvent)return;const roll=Math.random();if(roll<.45){state.pendingEvent={kind:'none',resolved:true,title:'Settimana normale',text:'Nessun evento particolare. La squadra pensa solo alla partita.'}}else if(roll<.75){const e=pick(AUTO_EVENTS),result=e.apply();state.pendingEvent={kind:'auto',resolved:true,title:e.title,text:e.text,result}}else{const d=pick(DECISIONS);state.pendingEvent={kind:'decision',resolved:false,title:d.title,text:d.text,decisionIndex:DECISIONS.indexOf(d)}}save()}

function showSeason(){prepareEvent();const fx=userFixture(),opp=teamById(fx.home===USER_ID?fx.away:fx.home),standing=userStanding(),rank=sortedTable().findIndex(x=>x.id===USER_ID)+1;screen.innerHTML=`<section class="panel"><div class="season-strip"><div class="stat"><b>${state.matchday+1}</b><span>Giornata</span></div><div class="stat"><b>${rank}°</b><span>Posizione</span></div><div class="stat"><b>${standing.pts}</b><span>Punti</span></div><div class="stat"><b>${standing.gf}</b><span>Gol fatti</span></div><div class="stat"><b>${standing.ga}</b><span>Gol subiti</span></div></div></section><div class="dashboard-grid"><div><section class="panel"><div class="label">Prossima partita</div><div class="next-match"><div><div class="team-name">${esc(fx.home===USER_ID?state.teamName:opp.name)}</div><div class="subline">${fx.home===USER_ID?'Casa':'Avversario'}</div></div><div class="versus">VS</div><div><div class="team-name">${esc(fx.away===USER_ID?state.teamName:opp.name)}</div><div class="subline">${fx.away===USER_ID?'Trasferta':'Avversario'}</div></div></div><div style="margin-top:14px">${renderEvent()}</div><div style="margin-top:14px"><button id="playRound" class="btn primary" ${state.pendingEvent&&!state.pendingEvent.resolved?'disabled':''}>Gioca la giornata ${state.matchday+1}</button></div></section><section class="panel"><div class="tabs"><button class="tab active" data-tab="table">Classifica</button><button class="tab" data-tab="calendar">Calendario</button><button class="tab" data-tab="roster">Rosa</button><button class="tab" data-tab="stats">Statistiche</button></div><div id="tab-table" class="tab-view active">${renderTable()}</div><div id="tab-calendar" class="tab-view">${renderCalendar()}</div><div id="tab-roster" class="tab-view">${renderRosterMini()}</div><div id="tab-stats" class="tab-view">${renderStats()}</div></section></div><aside><section class="panel"><div class="label">Indisponibili</div><h3>Gestione formazione</h3>${renderAvailability()}<p style="font function renderCalendar(){return `<div class="calendar">${state.schedule.map((rd,i)=>{const fx=rd.find(m=>m.home===USER_ID||m.away===USER_ID),o=teamById(fx.home===USER_ID?fx.away:fx.home),hist=state.history[i];return `<div class="calendar-row ${i===state.matchday?'current':''} ${i<state.matchday?'done':''}"><b>G ${i+1}</b><span>${esc(fx.home===USER_ID?state.teamName:o.name)} – ${esc(fx.away===USER_ID?state.teamName:o.name)}</span><strong>${hist?`${hist.gf}-${hist.ga}`:'-'}</strong></div>`}).join('')}</div>`}
function renderStats(){const goals=Object.entries(state.stats.goals).sort((a,b)=>b[1]-a[1]).slice(0,10);const assists=Object.entries(state.stats.assists).sort((a,b)=>b[1]-a[1]).slice(0,10);return `<div class="setup-grid"><div><h3>Marcatori</h3>${goals.length?goals.map(([id,n],i)=>`<p><b>${i+1}. ${esc((playerById(id)||{name:id}).name)}</b> — ${n}</p>`).join(''):'<p>Nessun gol.</p>'}</div><div><h3>Assist</h3>${assists.length?assists.map(([id,n],i)=>`<p><b>${i+1}. ${esc((playerById(id)||{name:id}).name)}</b> — ${n}</p>`).join(''):'<p>Nessun assist.</p>'}</div></div>`}
function poisson(lambda){let L=Math.exp(-lambda),p=1,k=0;do{k++;p*=Math.random()}while(p>L&&k<12);return k-1}
function simulateScore(powerA,powerB,homeAdv=0){const la=clamp(1.25+(powerA-powerB)/18+homeAdv,.15,4.5),lb=clamp(1.15+(powerB-powerA)/18-homeAdv,.15,4.5);return[poisson(la),poisson(lb)]}
function weightedScorer(line){const pool=[];line.forEach(r=>{const role=roleOf(r.player),w=role==='A'?7:role==='C'?4:role==='D'?1:.15;for(let i=0;i<Math.ceil(w);i++)pool.push(r)});return pick(pool)}
function goalDescription(player,assist){const pos=positions(player)[0]||'ATT',pool=(COMMENTARY?.positions?.[pos]||COMMENTARY?.positions?.ATT||['{marcatore} trova la rete.']);let s=pick(pool);if(!assist)s=pool.find(x=>!x.includes('{assist}'))||s;return String(s).replaceAll('{marcatore}',player.name).replaceAll('{assist}',assist?.name||'').replaceAll('{squadra}',state.teamName).replaceAll('{avversario}','avversario')}
function buildUserGoals(n,line){const events=[];for(let i=0;i<n;i++){const s=weightedScorer(line),others=line.filter(x=>x.playerId!==s.playerId),a=Math.random()<.72?pick(others):null;state.stats.goals[s.playerId]=(state.stats.goals[s.playerId]||0)+1;if(a)state.stats.assists[a.playerId]=(state.stats.assists[a.playerId]||0)+1;events.push({minute:Math.floor(5+Math.random()*84),player:s.player.name,assist:a?.player.name||'',description:goalDescription(s.player,a?.player)})}return events.sort((a,b)=>a.minute-b.minute)}
function updateStanding(id,gf,ga){const s=state.standings[id];s.p++;s.gf+=gf;s.ga+=ga;if(gf>ga){s.w++;s.pts+=3}else if(gf===ga){s.d++;s.pts++}else s.l++}
function playRound(){if(state.pendingEvent&&!state.pendingEvent.resolved)return;const fixture=userFixture(),opp=teamById(fixture.home===USER_ID?fixture.away:fixture.home),line=resolveLineup(),power=matchPower(),userHome=fixture.home===USER_ID;const [hg,ag]=simulateScore(userHome?power:opp.strength,userHome?opp.strength:power,.18);const gf=userHome?hg:ag,ga=userHome?ag:hg;const goals=buildUserGoals(gf,line);modalRoot.innerHTML=`<div class="modal-backdrop"><div class="modal"><div class="label">Giornata ${state.matchday+1}</div><h2>Partita in corso...</h2><div class="sim"><span></span></div><p>Il campionato sta simulando tutte le partite della giornata.</p></div></div>`;setTimeout(()=>{currentRound().forEach(m=>{let h,a;if(m===fixture){h=hg;a=ag}else{const th=teamById(m.home),ta=teamById(m.away);[h,a]=simulateScore(th.strength,ta.strength,.18)}updateStanding(m.home,h,a);updateStanding(m.away,a,h)});state.history.push({matchday:state.matchday+1,opponent:opp.name,home:userHome,gf,ga,goals,power:Math.round(power*10)/10});state.lastResult=state.history[state.history.length-1];postMatch();save();showResultModal()},1250)}
function postMatch(){const cardEffect=state.activeEffects.some(e=>e.type==='cards');Object.values(state.statuses).forEach(s=>{if(s.injury>0)s.injury--;if(s.suspension>0)s.suspension--});if(Math.random()<(cardEffect?.18:.07)){const r=pick(rosterPlayers());if(r)statusOf(r.playerId).suspension=1}state.activeEffects.forEach(e=>e.rounds--);state.activeEffects=state.activeEffects.filter(e=>e.rounds>0);state.playInjured={};state.matchday++;state.pendingEvent=null;if(state.matchday===19){state.phase='midseason';state.midseason={step:0,outgoingId:'',nation:'',candidates:[]}}else if(state.matchday>=38)state.phase='finished';else prepareEvent()}
function showResultModal(){const r=state.lastResult;modalRoot.innerHTML=`<div class="modal-backdrop"><div class="modal"><div class="label">Risultato finale</div><div class="match-result"><div class="team-name">${esc(state.teamName)} vs ${esc(r.opponent)}</div><div class="score">${r.gf}–${r.ga}</div><div class="goals">${r.goals.length?r.goals.map(g=>`<div class="goal-line"><b>${g.minute}' · ${esc(g.player)}</b>${g.assist?` · Assist ${esc(g.assist)}`:''}<br>${esc(g.description)}</div>`).join(''):'<div class="goal-line">Nessun gol della tua squadra.</div>'}</div></div><button id="closeResult" class="btn primary" style="margin-top:14px">Continua</button></div></div>`;document.getElementById('closeResult').onclick=()=>{modalRoot.innerHTML='';render()}}
function showMidseason(){const ms=state.midseason,selected=ms.outgoingId?rosterEntry(ms.outgoingId):null;screen.innerHTML=`<section class="panel"><div class="label">Giro di boa</div><h2>Draft di metà campionato</h2><p>Cambia esattamente 2 giocatori. Se sostituisci un titolare, il nuovo giocatore deve essere compatibile con il suo slot preciso.</p><div class="mid-grid"><div><h3>1. Scegli chi lascia la rosa</h3><div class="outgoing-list">${rosterPlayers().map(r=>`<button class="outgoing ${ms.outgoingId===r.playerId?'active':''}" data-out="${esc(r.playerId)}"><b>${esc(r.player.name)}</b><br><small>${esc(r.slot)} · ${esc(r.player.Position)}</small></button>`).join('')}</div></div><div><h3>2. Nuovo draft (${ms.step+1}/2)</h3>${selected?`<p>Uscita: <b>${esc(selected.player.name)}</b> — slot ${esc(selected.slot)}</p><button id="drawMarket" class="btn gold">${ms.nation?'Cambia nazionale':'Estrai nazionale'}</button>${ms.nation?`<div class="nation-card"><div class="need">Nazione estratta</div><div class="nation-name">${esc(ms.nation)}</div></div><div class="candidate-grid">${ms.candidates.map(id=>{const p=playerById(id);return `<button class="candidate" data-market="${id}"><div class="name">${esc(p.name)}</div><div class="meta"><span class="chip">${esc(p.Position)}</span><span class="chip ovr">OVR ${p.ovr}</span></div></button>`}).join('')}</div>`:''}`:'<p>Seleziona un giocatore dalla rosa.</p>'}</div></div></section>`;document.querySelectorAll('[data-out]').forEach(b=>b.onclick=()=>{ms.outgoingId=b.dataset.out;ms.nation='';ms.candidates=[];save();render()});const draw=document.getElementById('drawMarket');if(draw)draw.onclick=drawMarket;document.querySelectorAll('[data-market]').forEach(b=>b.onclick=()=>completeMarket(b.dataset.market))}
function drawMarket(){const ms=state.midseason,out=rosterEntry(ms.outgoingId),used=new Set(state.draft.roster.map(r=>String(r.playerId)));let base=PLAYERS.filter(p=>!used.has(String(p.id))&&(out.bench||compatible(p,out.slot)));const groups={};base.forEach(p=>(groups[p.nation]??=[]).push(p));const ns=Object.keys(groups).filter(n=>groups[n].length>=2);ms.nation=pick(ns.length?ns:Object.keys(groups));ms.candidates=shuffle(groups[ms.nation]||[]).slice(0,4).map(p=>String(p.id));save();render()}
function completeMarket(id){const ms=state.midseason,idx=state.draft.roster.findIndex(r=>String(r.playerId)===String(ms.outgoingId));if(idx<0)return;const replacement=playerById(id);state.draft.roster[idx].playerId=String(id);state.draft.roster[idx].player=replacement?{...replacement}:null;ms.step++;ms.outgoingId='';ms.nation='';ms.candidates=[];if(ms.step>=2){state.phase='season';prepareEvent();toast('Mercato completato')}save();render()}
function showFinished(){const table=sortedTable(),rank=table.findIndex(x=>x.id===USER_ID)+1,s=userStanding(),top=Object.entries(state.stats.goals).sort((a,b)=>b[1]-a[1])[0],topPlayer=top?playerById(top[0]):null;screen.innerHTML=`<section class="panel"><div class="final-hero"><div class="label" style="color:#ffe96c">Stagione conclusa</div><h2>${rank===1?'Campioni!':'Campionato terminato'}</h2><div class="final-position">${rank}°</div><p>${esc(state.teamName)} chiude la stagione dopo 38 giornate.</p></div><div class="final-grid"><div class="stat"><b>${s.pts}</b><span>Punti</span></div><div class="stat"><b>${s.w}-${s.d}-${s.l}</b><span>V-N-P</span></div><div class="stat"><b>${s.gf}</b><span>Gol fatti</span></div><div class="stat"><b>${s.ga}</b><span>Gol subiti</span></div></div><section class="panel"><h3>Capocannoniere</h3><p>${topPlayer?`<b>${esc(topPlayer.name)}</b> — ${top[1]} gol`:'Nessun marcatore'}</p><div class="top-actions"><button id="sendSeason" class="btn primary" ${state.submitted?'disabled':''}>${state.submitted?'Risultati inviati':'Invia risultati'}</button><button id="exportSeason" class="btn gold">Esporta risultati JSON</button></div></section>${renderTable()}</section>`;document.getElementById('sendSeason').onclick=sendSeason;document.getElementById('exportSeason').onclick=exportSeason}
async function sendSeason(){const s=userStanding(),top=Object.entries(state.stats.goals).sort((a,b)=>b[1]-a[1])[0],p=top?playerById(top[0]):null;const payload={squadra:state.teamName,allenatore:state.coachName,modalita:'Campionato del Ca***',vittorie:s.w,pareggi:s.d,sconfitte:s.l,gol_fatti:s.gf,gol_subiti:s.ga,modulo:state.formation,ovr_medio:Math.round(teamPowerBase()*10)/10,capocannoniere:p?`${p.name} (${top[1]})`:''};const fd=new FormData();fd.append('payload',JSON.stringify(payload));try{await fetch(VICTORY_ENDPOINT,{method:'POST',mode:'no-cors',body:fd});state.submitted=true;save();render();toast('Risultati inviati')}catch{toast('Invio non riuscito')}}
function exportSeason(){const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='fantaballa-campionato-risultati.json';a.click();URL.revokeObjectURL(a.href)}
function render(){if(!PLAYERS.length){screen.innerHTML='<section class="panel"><h2>Caricamento database giocatori...</h2></section>';return}if(state.phase==='setup')showSetup();else if(state.phase==='draft')showDraft();else if(state.phase==='season')showSeason();else if(state.phase==='midseason')showMidseason();else if(state.phase==='finished')showFinished()}
async function boot(){try{PLAYERS=await fetch('data/giocatori.json',{cache:'no-store'}).then(r=>{if(!r.ok)throw Error('giocatori');return r.json()});COMMENTARY=await fetch('data/cronaca-gol.json',{cache:'no-store'}).then(r=>r.ok?r.json():null).catch(()=>null);state=normalizeCampionatoState(state);save();render()}catch(e){screen.innerHTML='<section class="panel"><h2>Database non disponibile</h2><p>Apri il sito tramite hosting web, non con doppio click locale.</p></section>'}}
document.getElementById('resetBtn').onclick=()=>{if(confirm('Cancellare definitivamente la stagione salvata?')){localStorage.removeItem(SAVE_KEY);state=freshState();render()}};
boot();
</script>
</body></html>
