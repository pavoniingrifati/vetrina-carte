<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FantaMondiale FM - Squadra</title>
  <style>
    :root {
      --bg: #111111;
      --panel: #e7e7e3;
      --text: #f5f5f5;
      --dark: #171717;
      --green: #00c875;
      --green2: #00a65a;
      --gold: #d6ff00;
      --pitch: #03bf6a;
      --pitch2: #00aa5a;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    button, input, select { font: inherit; }
    button { cursor: pointer; border: 0; transition: transform .12s ease, opacity .12s ease, background .12s ease; }
    button:hover { transform: translateY(-1px); }
    button:disabled { cursor: not-allowed; opacity: .38; transform: none; }

    .app {
      max-width: 1180px;
      margin: 0 auto;
      min-height: 100vh;
      display: grid;
      grid-template-columns: minmax(640px, 1fr) 410px;
      gap: 24px;
      padding: 42px 32px 28px;
    }

    @media (max-width: 1050px) { .app { grid-template-columns: 1fr; padding: 20px; } }
    .left { min-width: 0; }

    .topbar {
      display: grid;
      place-items: center;
      margin-bottom: 18px;
    }
    .simplified-topbar { text-align: center; }
    .app-title {
      margin: 0;
      color: #fff;
      font-size: clamp(28px, 5vw, 52px);
      line-height: .95;
      font-weight: 1000;
      letter-spacing: -0.055em;
      text-transform: uppercase;
      text-shadow: 0 10px 34px rgba(0,0,0,.38);
    }

    .top-item {
      min-height: 48px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding-right: 24px;
      border-right: 1px solid rgba(255,255,255,0.28);
    }
    .top-item:last-child { border-right: 0; padding-right: 0; }
    .top-big { font-size: 18px; line-height: 1; font-weight: 950; letter-spacing: -0.03em; }
    .top-big .arrow { color: var(--green); font-size: 12px; margin-left: 3px; }
    .top-label { color: #777; font-size: 9px; line-height: 1; margin-top: 10px; text-transform: uppercase; font-weight: 900; }
    .status-title { font-size: 17px; font-weight: 950; letter-spacing: .02em; }
    .status-sub { color: #777; font-size: 9px; margin-top: 9px; font-weight: 900; text-transform: uppercase; }
    .help {
      width: 20px; height: 20px; border: 2px solid #fff; border-radius: 50%;
      display: grid; place-items: center; font-size: 12px; font-weight: 950;
    }

    .credits {
      display: inline-grid;
      align-items: center;
      justify-items: center;
      min-width: 190px;
      min-height: 72px;
      background: linear-gradient(135deg, #242424, #343434);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 14px;
      margin: 0 0 22px;
      padding: 12px 18px;
      box-shadow: 0 14px 32px rgba(0,0,0,.25);
      letter-spacing: -0.04em;
    }
    .credits strong {
      display: block;
      margin-top: 4px;
      font-size: 28px;
      line-height: 1;
      font-weight: 1000;
      color: var(--green);
    }
    .credits span {
      display: block;
      color: #bdbdbd;
      font-size: 10px;
      letter-spacing: .08em;
      text-transform: uppercase;
      font-weight: 950;
    }

    .score-summary {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      max-width: 540px;
      margin: 0 auto 18px;
    }
    .score-card {
      background: linear-gradient(135deg, #1c1c1c, #292929);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 14px;
      padding: 12px 14px;
      text-align: center;
      box-shadow: 0 12px 28px rgba(0,0,0,.22);
    }
    .score-card span {
      display: block;
      color: #aaa;
      font-size: 9px;
      font-weight: 950;
      letter-spacing: .08em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .score-card strong {
      display: block;
      color: var(--gold);
      font-size: 24px;
      line-height: 1;
      font-weight: 1000;
      letter-spacing: -0.04em;
    }
    .stat-tag {
      display: inline-grid;
      place-items: center;
      min-width: 48px;
      height: 20px;
      padding: 0 7px;
      border-radius: 999px;
      background: #f0f0f0;
      color: #333;
      font-size: 8px;
      font-weight: 950;
      letter-spacing: .02em;
      white-space: nowrap;
    }

    .teamline { display: flex; justify-content: center; align-items: center; gap: 16px; margin-bottom: 14px; }
    .captain-box { display: grid; gap: 6px; }
    .cap-label {
      background: var(--gold); color: #111; display: inline-grid; place-items: center;
      width: 42px; height: 32px; font-weight: 950; border-radius: 2px 2px 0 0;
    }
    .cap-number {
      background: #fff; color: #111; display: inline-grid; place-items: center;
      width: 42px; height: 34px; font-weight: 950; border-radius: 0 0 4px 4px;
    }
    .team-actions { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .manager-input {
      width: 190px; height: 40px; border-radius: 7px; border: 1px solid #3a3a3a;
      background: #161616; color: #fff; padding: 0 12px; font-weight: 800;
    }
    .random-btn {
      height: 40px; border-radius: 7px; padding: 0 18px; background: transparent;
      border: 1px solid var(--green); color: var(--green); font-weight: 950; letter-spacing: .02em;
    }

    .pitch-area { position: relative; min-height: 640px; display: grid; place-items: center; }

    .pitch {
      width: min(560px, 88vw);
      height: 540px;
      position: relative;
      background:
        repeating-linear-gradient(90deg, rgba(255,255,255,.04) 0 54px, transparent 54px 108px),
        linear-gradient(180deg, var(--pitch), var(--pitch2));
      border-radius: 18px;
      box-shadow: 0 26px 70px rgba(0,0,0,.35);
      overflow: hidden;
      border: 3px solid rgba(255,255,255,.86);
    }
    .pitch:before {
      content: "";
      position: absolute;
      inset: 16px;
      border: 3px solid rgba(255,255,255,.83);
      border-radius: 12px;
      pointer-events: none;
    }
    .pitch:after {
      content: "";
      position: absolute;
      left: 50%; top: 50%;
      width: 76px; height: 76px;
      border: 3px solid rgba(255,255,255,.83);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }
    .midline, .box-top, .box-bottom, .goal-bottom {
      position: absolute;
      left: 50%; transform: translateX(-50%);
      border: 3px solid rgba(255,255,255,.83);
      pointer-events: none;
    }
    .midline { top: 50%; width: 100%; border-width: 3px 0 0 0; }
    .box-top { top: 16px; width: 210px; height: 58px; border-top: 0; border-radius: 0 0 12px 12px; }
    .box-bottom { bottom: 16px; width: 250px; height: 84px; border-bottom: 0; border-radius: 12px 12px 0 0; }
    .goal-bottom { bottom: 16px; width: 124px; height: 46px; border-bottom: 0; border-radius: 8px 8px 0 0; }

    .formation {
      position: absolute;
      inset: 0;
      padding: 18px 34px 18px;
      display: grid;
      grid-template-rows: 125px 132px 132px 105px;
      align-items: center;
      z-index: 2;
    }
    .line { display: flex; justify-content: center; align-items: center; gap: 34px; }
    .line.def, .line.mid, .line.att { gap: 34px; }

    .slot {
      width: 76px;
      min-height: 90px;
      background: #fff;
      color: #111;
      border-radius: 7px;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 7px 5px;
      box-shadow: 0 10px 20px rgba(0,0,0,.16);
      position: relative;
      border: 2px solid transparent;
    }
    .slot.active { border-color: var(--gold); box-shadow: 0 0 0 4px rgba(214,255,0,.25), 0 10px 20px rgba(0,0,0,.16); }
    .slot .plus {
      width: 19px; height: 19px; background: #191919; color: #fff; border-radius: 50%;
      display: grid; place-items: center; font-size: 18px; font-weight: 900; line-height: 18px; margin: 0 auto 8px;
    }
    .slot-role { font-size: 11px; font-weight: 800; }
    .remove-mini {
      position: absolute; right: -9px; top: -9px; width: 22px; height: 22px; border-radius: 50%;
      background: #fff; color: #111; border: 1px solid #111; display: grid; place-items: center;
      font-weight: 950; font-size: 13px; z-index: 5;
    }
    .pitch-player { width: 100%; display: grid; justify-items: center; gap: 2px; }
    .pitch-shirt {
      width: 46px; height: 40px; position: relative; display: block;
      clip-path: polygon(18% 0, 36% 0, 42% 10%, 58% 10%, 64% 0, 82% 0, 100% 18%, 86% 42%, 86% 100%, 14% 100%, 14% 42%, 0 18%);
      color: #fff; text-shadow: 0 1px 4px rgba(0,0,0,.35); margin-top: -2px;
      border: 1px solid rgba(255,255,255,.12);
      overflow: hidden;
    }
    .slot-name {
      background: #111; color: #fff; border-radius: 3px; padding: 3px 5px; margin-top: 1px;
      max-width: 80px; font-size: 9px; font-weight: 950; line-height: 1.05; text-transform: uppercase;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .slot-info {
      display: grid; grid-template-columns: 1fr 1fr; width: 62px; background: #fff; color: #111;
      border: 1px solid #d8d8d8; border-radius: 4px; overflow: hidden; font-size: 8px; font-weight: 950;
    }
    .slot-info span { padding: 2px 1px; border-right: 1px solid #ddd; }
    .slot-info span:last-child { border-right: 0; }
    .slot-nation { color: #555; font-size: 8px; font-weight: 900; max-width: 70px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .bench-title { text-align: center; color: #8f8f8f; font-size: 11px; font-weight: 950; margin-top: -2px; }
    .bench { display: flex; justify-content: space-between; gap: 16px; margin: 14px 0 16px; }
    @media (max-width: 760px) {
      body { overflow-x: hidden; }
      .app { padding: 12px; gap: 18px; }
      .topbar { margin-bottom: 14px; }
      .app-title { font-size: 30px; line-height: 1; }
      .teamline { flex-wrap: wrap; align-items: stretch; gap: 12px; }
      .team-actions { width: 100%; flex-wrap: wrap; }
      .manager-input { width: 100%; min-width: 0; }
      .module-select { min-width: 96px; }
      .random-btn { flex: 1 1 180px; }
      .pitch-area { min-height: auto; }
      .pitch {
        width: 100%;
        max-width: 100%;
        height: auto;
        aspect-ratio: 1.3 / 1;
      }
      .formation {
        padding: 10px 10px 8px;
        grid-template-rows: 76px 92px 92px 76px;
      }
      .line {
        width: 100%;
        justify-content: space-evenly !important;
        gap: 8px !important;
      }
      .bench { flex-wrap: wrap; justify-content: center; gap: 10px; }
      .slot { width: 62px; min-height: 78px; padding: 6px 4px; }
      .slot .plus { margin-bottom: 6px; }
      .slot-name { max-width: 58px; font-size: 8px; }
      .slot-info { width: 54px; font-size: 7px; }
      .slot-nation { max-width: 58px; font-size: 7px; }
      .pitch-shirt { width: 38px; height: 33px; }
      .pitch-shirt-code { font-size: 6px; top: 5px; }
      .pitch-shirt-num { font-size: 10px; bottom: 5px; }
    }

    @media (max-width: 480px) {
      .app { padding: 10px; }
      .topbar { display: grid; place-items: center; }
      .app-title { font-size: 26px; }
      .pitch {
        aspect-ratio: 1.18 / 1;
      }
      .formation {
        padding: 8px 8px 6px;
        grid-template-rows: 70px 86px 86px 72px;
      }
      .line { gap: 6px !important; }
      .slot { width: 56px; min-height: 72px; padding: 5px 3px; }
      .slot-role { font-size: 10px; }
      .slot-name { max-width: 52px; font-size: 7px; }
      .slot-info { width: 48px; font-size: 6.5px; }
      .slot-nation { max-width: 50px; font-size: 6.5px; }
      .pitch-shirt { width: 34px; height: 30px; }
      .remove-mini { width: 20px; height: 20px; right: -7px; top: -7px; }
    }

    .bottom-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; max-width: 540px; margin: 0 auto; }
    .bottom-actions-three { grid-template-columns: 1fr 1fr; }
    .bottom-actions-three .share-btn { grid-column: 1 / -1; }
    .bottom-actions-four { grid-template-columns: 1fr 1fr; }
    .cancel-btn, .save-btn, .share-btn, .download-btn { height: 42px; border-radius: 6px; font-weight: 950; font-size: 16px; }
    .cancel-btn { color: #fff; background: #151515; border: 1px solid #555; }
    .save-btn { color: #fff; background: #747474; }
    .download-btn { color: #fff; background: #2765ff; border: 1px solid rgba(255,255,255,.12); }
    .share-btn { color: #07120c; background: var(--green); border: 1px solid rgba(255,255,255,.1); }
    .save-btn.valid { background: var(--green); color: #07120c; }

    .market {
      background: var(--panel); color: var(--dark); border-radius: 20px; padding: 18px 20px;
      min-height: calc(100vh - 84px); display: flex; flex-direction: column; box-shadow: 0 25px 70px rgba(0,0,0,.35);
    }
    .tabs { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 26px; }
    .tabs-single { grid-template-columns: 1fr; margin-bottom: 20px; }
    .tabs-single .tab { justify-content: center; }
    .tab { display: grid; place-items: center; gap: 5px; color: #333; font-size: 11px; font-weight: 700; }
    .tab svg { width: 22px; height: 22px; stroke-width: 1.6; }
    .tab.active { color: var(--green2); }

    .search-row { display: grid; grid-template-columns: 1fr 44px; gap: 8px; margin-bottom: 10px; }
    .search-box {
      height: 41px; background: white; border-radius: 6px; display: grid; grid-template-columns: 34px 1fr;
      align-items: center; padding: 0 10px;
    }
    .search-box input { border: 0; outline: 0; background: transparent; font-weight: 700; color: #444; width: 100%; }
    .filter-btn { height: 41px; border: 1px solid #777; background: transparent; border-radius: 6px; color: #333; display: grid; place-items: center; }

    .filters { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 18px; }
    .chip { min-width: 31px; height: 31px; border-radius: 6px; border: 1px solid #111; background: transparent; color: #111; font-weight: 900; }
    .chip.active { background: #111; color: #fff; }
    .nation-select, .module-select, .sort-select {
      height: 31px; border-radius: 6px; border: 1px solid #111; background: transparent; color: #111;
      font-weight: 900; padding: 0 8px; max-width: 145px;
    }
    .module-select { background: #fff; }

    .official-count { color:#555; font-size:11px; font-weight:900; text-align:center; margin:-6px 0 8px; }
    .players-list { display: grid; gap: 10px; overflow: auto; padding-right: 2px; max-height: calc(100vh - 280px); }
    .player-card {
      min-height: 76px;
      background: #fff;
      border-radius: 10px;
      display: grid;
      grid-template-columns: 64px minmax(0, 1fr) 62px;
      gap: 10px;
      align-items: center;
      padding: 9px 9px 9px 0;
      overflow: visible;
      position: relative;
    }
    .player-card.disabled { opacity: .45; }
    .shirt {
      height: 60px; width: 64px; position: relative; display: block;
      clip-path: polygon(18% 0, 36% 0, 42% 10%, 58% 10%, 64% 0, 82% 0, 100% 18%, 86% 42%, 86% 100%, 14% 100%, 14% 42%, 0 18%);
      color: white; font-weight: 950; text-shadow: 0 1px 4px rgba(0,0,0,.35);
      overflow: hidden;
    }
    .shirt-code, .pitch-shirt-code { position: absolute; left: 50%; transform: translateX(-50%); top: 7px; font-size: 8px; line-height: 1; font-weight: 900; letter-spacing: .08em; }
    .shirt-num, .pitch-shirt-num { position: absolute; left: 50%; transform: translateX(-50%); bottom: 7px; font-size: 15px; line-height: 1; font-weight: 950; }
    .pitch-shirt-code { top: 6px; font-size: 7px; }
    .pitch-shirt-num { bottom: 6px; font-size: 12px; }
    .pname { font-size: 12px; line-height: 1.05; font-weight: 950; text-transform: uppercase; margin-bottom: 5px; }
    .pmeta {
      display: flex;
      flex-wrap: wrap;
      gap: 5px 6px;
      color: #666;
      font-size: 9px;
      font-weight: 850;
      line-height: 1.25;
      overflow: visible;
    }
    .role-mini {
      display: inline-grid; place-items: center; min-width: 15px; height: 15px; background: #e8e8e8; color: #777;
      border-radius: 3px; font-size: 8px; font-weight: 950; margin-right: 5px;
    }
    .price {
      height: 42px;
      border: 1px solid #222;
      border-radius: 6px;
      background: white;
      color: #111;
      font-size: 16px;
      font-weight: 950;
      display: grid;
      place-items: center;
    }

    .export-box { margin-top: 14px; display: none; }
    .export-box textarea {
      width: 100%; min-height: 120px; resize: vertical; border: 1px solid #aaa; border-radius: 8px;
      padding: 10px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 11px;
    }
    .toast {
      position: fixed; left: 50%; bottom: 24px; transform: translateX(-50%); background: #fff; color: #111;
      padding: 12px 16px; border-radius: 999px; font-weight: 950; opacity: 0; pointer-events: none;
      transition: opacity .2s ease, transform .2s ease; box-shadow: 0 10px 30px rgba(0,0,0,.25); z-index: 10;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(-4px); }
  
    /* Mobile final fix */
    @media (max-width: 760px) {
      .app { padding: 12px; gap: 18px; }
      .topbar { margin-bottom: 14px; }
      .app-title { font-size: 30px; line-height: 1; text-align: center; }
      .credits { width: 100%; max-width: 260px; margin-left: auto; margin-right: auto; display: grid; }
      .teamline { display: grid; justify-items: center; gap: 12px; }
      .team-actions { width: 100%; display: grid; grid-template-columns: 1fr 110px; gap: 10px; justify-items: stretch; }
      .manager-input { grid-column: 1 / -1; width: 100%; }
      .module-select { width: 100%; max-width: none; }
      .random-btn {
        grid-column: 1 / -1;
        justify-self: center;
        width: min(260px, 100%);
        text-align: center;
        padding: 0 14px;
      }
      .score-summary { grid-template-columns: 1fr 1fr; width: 100%; }
      .score-card { padding: 10px 8px; }
      .score-card strong { font-size: 20px; }
      .pitch-area { width: 100%; min-height: auto; overflow: visible; }
      .pitch { width: 100%; max-width: 100%; height: auto; aspect-ratio: 0.78 / 1; }
      .formation { padding: 14px 6px 12px; grid-template-rows: 22% 27% 27% 22%; }
      .line { width: 100%; justify-content: space-around !important; gap: 3px !important; }
      .slot { width: 54px; min-height: 68px; padding: 4px 3px; }
      .slot-name { max-width: 50px; font-size: 6.8px; padding: 2px 3px; }
      .slot-info { width: 46px; font-size: 6px; }
      .slot-nation { max-width: 48px; font-size: 6px; }
      .pitch-shirt { width: 30px; height: 27px; }
      .pitch-shirt-code { font-size: 5px; top: 4px; }
      .pitch-shirt-num { font-size: 9px; bottom: 4px; }
      .remove-mini { width: 18px; height: 18px; right: -6px; top: -6px; font-size: 11px; }
    }
    @media (max-width: 420px) {
      .app { padding: 10px 8px; }
      .app-title { font-size: 25px; }
      .pitch { aspect-ratio: 0.70 / 1; }
      .formation { padding: 12px 4px 10px; }
      .slot { width: 49px; min-height: 64px; padding: 4px 2px; }
      .slot-name { max-width: 45px; font-size: 6.1px; }
      .slot-info { width: 41px; font-size: 5.6px; }
      .slot-nation { max-width: 42px; font-size: 5.6px; }
      .pitch-shirt { width: 27px; height: 24px; }
      .pitch-shirt-code { font-size: 4.5px; }
      .pitch-shirt-num { font-size: 8px; }
    }

      /* Player card large fix */

    @media (max-width: 760px) {
      .player-card {
        min-height: 82px;
        grid-template-columns: 58px minmax(0, 1fr) 58px;
        gap: 8px;
        padding: 9px 8px 9px 0;
      }
      .shirt { width: 58px; height: 56px; }
      .pname { font-size: 11px; }
      .pmeta { gap: 4px 5px; font-size: 8px; }
      .stat-tag { min-width: 43px; height: 18px; padding: 0 5px; font-size: 7px; }
      .price { width: 52px; height: 40px; font-size: 15px; }
    }

  
    .send-modal {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: none;
      place-items: center;
      padding: 18px;
    }
    .send-modal.open { display: grid; }
    .send-modal-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,.68);
      backdrop-filter: blur(8px);
    }
    .send-modal-card {
      position: relative;
      width: min(680px, 100%);
      max-height: 88vh;
      overflow: auto;
      background: #f4f4ef;
      color: #111;
      border-radius: 22px;
      padding: 22px;
      box-shadow: 0 28px 90px rgba(0,0,0,.48);
      border: 1px solid rgba(255,255,255,.25);
    }
    .send-modal-card h2 {
      margin: 0 0 8px;
      font-size: 26px;
      letter-spacing: -.04em;
      font-weight: 1000;
    }
    .send-modal-card p {
      margin: 0 0 14px;
      color: #333;
      line-height: 1.45;
      font-size: 14px;
      font-weight: 650;
    }
    .send-modal-card textarea {
      width: 100%;
      min-height: 310px;
      resize: vertical;
      border: 1px solid #cfcfcf;
      border-radius: 14px;
      padding: 14px;
      background: #fff;
      color: #111;

function sortPlayers(list) {
  const sort = els.sortSelect.value;
  const sorted = [...list];
  if (sort === 'cost_asc') sorted.sort((a,b) => a.cost - b.cost || b.rating - a.rating);
  else if (sort === 'rating_desc') sorted.sort((a,b) => b.rating - a.rating || b.cost - a.cost);
  else if (sort === 'rating_asc') sorted.sort((a,b) => a.rating - b.rating || a.cost - b.cost);
  else if (sort === 'name_asc') sorted.sort((a,b) => a.name.localeCompare(b.name));
  else sorted.sort((a,b) => b.cost - a.cost || b.rating - a.rating);
  return sorted;

  const q = els.searchInput.value.trim().toLowerCase();
  const nation = els.nationFilter.value;
  const active = allSlots().find(s => s.key === activeSlot);
  let desiredRole = roleFilter;
  if (active && roleFilter === 'all') desiredRole = active.role === 'J' ? 'all' : active.role;

  let list = players.filter(p => {
    if (usedIds().includes(p.id)) return false;
    if (q && !p.name.toLowerCase().includes(q)) return false;
    if (nation !== 'all' && p.nation !== nation) return false;
    if (desiredRole !== 'all' && p.role !== desiredRole) return false;
    return true;
  });
  list = sortPlayers(list);
  const totalMatches = list.length;
  const shownList = list.slice(0, 350);
  if (els.officialCount) {
    els.officialCount.textContent = `${totalMatches} giocatori trovati · visualizzati ${shownList.length}. Usa ricerca e filtri per restringere.`;
  }

  els.playersList.innerHTML = shownList.map(p => {
    const canAfford = remaining() >= p.cost;
    return `<button class="player-card ${canAfford ? '' : 'disabled'}" ${canAfford ? '' : 'disabled'} onclick="pickPlayer(${p.id})"><div class="shirt" style="${shirtStyle(p.nation)}">${shirtMarkup(p, false)}</div><div><div class="pname"><span class="role-mini">${p.role}</span>${p.name}</div><div class="pmeta"><span>${p.nation}</span><span>${p.position || ''}</span><span class="stat-tag">MED ${formatOneDecimal(playerExpectedPoints(p))}</span><span class="stat-tag">PRES ${p.games || 0}</span><span class="stat-tag">TOT ${formatOneDecimal(p.totalPoints || 0)}</span><span>OVR ${p.overall || p.rating * 2}</span><span>FOR ${p.rating}</span></div></div><div class="price">${p.cost}</div></button>`;

  }
  render();
}
function removeFromSlot(key) {

function pickPlayer(id) {
  const p = player(id);
  let slot = activeSlot ? allSlots().find(s => s.key === activeSlot) : null;
  if (!slot || slot.playerId || (slot.role !== 'J' && slot.role !== p.role)) {
    slot = allSlots().find(s => !s.playerId && (s.role === p.role || s.role === 'J'));
  }
  if (!slot) return showToast('Nessuno slot compatibile');
  if (remaining() < p.cost) return showToast('Crediti insufficienti');
  slot.playerId = id;
  activeSlot = null;
  saveLocal();
  render();
}

  state.manager = els.managerInput.value.trim();
  selectedPlayers.forEach(p => {
    const slot = allSlots().find(s => !s.playerId && (s.role === p.role || s.role === 'J'));
    if (slot) slot.playerId = p.id;
  });
  activeSlot = null;
  saveLocal();
  render();
}
function randomTeam() {
  const module = state.module;
  state = newState(module);
  state.manager = els.managerInput.value.trim();
  const sorted = [...players].sort((a,b) => b.cost - a.cost);
  allSlots().forEach(slot => {
    const candidates = sorted.filter(p => !usedIds().includes(p.id) && (slot.role === 'J' || p.role === slot.role) && remaining() >= p.cost);
    if (candidates.length) {
      const index = Math.min(candidates.length - 1, Math.floor(Math.random() * Math.min(candidates.length, 8)));
      slot.playerId = candidates[index].id;
    }
  });
  saveLocal();
  render();
}

function roundRectPath(ctx, x, y, w, h, r) {
  const radius = Math.min(r, w / 2, h / 2);
  ctx.beginPath();
  ctx.moveTo(x + radius, y);
  ctx.arcTo(x + w, y, x + w, y + h, radius);
  ctx.arcTo(x + w, y + h, x, y + h, radius);
  ctx.arcTo(x, y + h, x, y, radius);
  ctx.arcTo(x, y, x + w, y, radius);
  ctx.closePath();
}

function drawRoundedRect(ctx, x, y, w, h, r, fill, stroke = null, lineWidth = 1) {
  roundRectPath(ctx, x, y, w, h, r);
  ctx.fillStyle = fill;
  ctx.fill();
  if (stroke) {
    ctx.strokeStyle = stroke;
    ctx.lineWidth = lineWidth;
    ctx.stroke();
  }
}


function buildShirtPath(ctx, x, y, w, h) {
  ctx.beginPath();
  ctx.moveTo(x + w * .18, y);
  ctx.lineTo(x + w * .36, y);
  ctx.lineTo(x + w * .42, y + h * .10);
  ctx.lineTo(x + w * .58, y + h * .10);
  ctx.lineTo(x + w * .64, y);
  ctx.lineTo(x + w * .82, y);
  ctx.lineTo(x + w, y + h * .18);
  ctx.lineTo(x + w * .86, y + h * .42);
  ctx.lineTo(x + w * .86, y + h);
  ctx.lineTo(x + w * .14, y + h);
  ctx.lineTo(x + w * .14, y + h * .42);
  ctx.lineTo(x, y + h * .18);
  ctx.closePath();
}

function paintShirtFill(ctx, x, y, w, h, kit) {
  const type = kit.type || 'solid';
  const colors = kit.colors || ['#1c4fb8'];

  if (type === 'solid') {
    ctx.fillStyle = colors[0];
    ctx.fillRect(x, y, w, h);
    return;
  }

  if (type === 'split') {
    ctx.fillStyle = colors[0];
    ctx.fillRect(x, y, w * 0.45, h);
    ctx.fillStyle = colors[1] || colors[0];
    ctx.fillRect(x + w * 0.45, y, w * 0.55, h);
    return;
  }

  if (type === 'band') {
    ctx.fillStyle = colors[0];
    ctx.fillRect(x, y, w, h);
    ctx.fillStyle = colors[1] || '#f1c40f';
    ctx.fillRect(x, y + h * 0.36, w, h * 0.28);
    return;
  }

  if (type === 'vstripes2') {
    const stripe = w / 5;
    for (let i = 0; i < 5; i++) {
      ctx.fillStyle = colors[i % 2];
      ctx.fillRect(x + i * stripe, y, stripe + 1, h);
    }
    return;
  }

  if (type === 'vstripes3') {
    const stripe = w / 6;
    for (let i = 0; i < 6; i++) {
      ctx.fillStyle = colors[i % colors.length];
      ctx.fillRect(x + i * stripe, y, stripe + 1, h);
    }
    return;
  }

  if (type === 'check') {
    const cols = 4;
    const rows = 4;
    const tileW = w / cols;
    const tileH = h / rows;
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        ctx.fillStyle = colors[(r + c) % 2];
        ctx.fillRect(x + c * tileW, y + r * tileH, tileW + 1, tileH + 1);
      }
    }
    return;
  }

  ctx.fillStyle = colors[0];
  ctx.fillRect(x, y, w, h);
}

function drawShirt(ctx, x, y, w, h, p) {
  const kit = getNationKit(p.nation);
  ctx.save();
  buildShirtPath(ctx, x, y, w, h);
  ctx.save();
  ctx.clip();
  paintShirtFill(ctx, x, y, w, h, kit);
  ctx.restore();

  buildShirtPath(ctx, x, y, w, h);
  ctx.lineWidth = 2;
  ctx.strokeStyle = kit.border || 'rgba(255,255,255,.35)';
  ctx.stroke();

  ctx.fillStyle = kit.text || '#ffffff';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.font = '900 13px Inter, Arial';
  ctx.fillText(nationCode(p.nation), x + w / 2, y + h * .28);
  ctx.font = '1000 25px Inter, Arial';
  ctx.fillText(String(p.rating || 0), x + w / 2, y + h * .68);
  ctx.restore();
}

function drawPlayerCard(ctx, cx, cy, p) {
  const w = 138;
  const h = 150;
  const x = cx - w / 2;
  const y = cy - h / 2;

  drawRoundedRect(ctx, x, y, w, h, 16, '#ffffff', 'rgba(0,0,0,.10)', 2);

  drawShirt(ctx, cx - 32, y + 10, 64, 58, p);

  drawRoundedRect(ctx, x + 12, y + 75, w - 24, 25, 6, '#111111');
  ctx.fillStyle = '#ffffff';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.font = '1000 12px Inter, Arial';
  const cleanName = String(p.name || '').toUpperCase();

}


function drawBenchSlot(ctx, cx, cy, slot) {

  ctx.textBaseline = 'middle';

function drawPitch(ctx, x, y, w, h) {
  const grad = ctx.createLinearGradient(0, y, 0, y + h);
  grad.addColorStop(0, '#03bf6a');
  grad.addColorStop(1, '#00aa5a');
  drawRoundedRect(ctx, x, y, w, h, 28, grad, 'rgba(255,255,255,.88)', 5);

  ctx.save();
  ctx.beginPath();
  roundRectPath(ctx, x, y, w, h, 28);
  ctx.clip();
  ctx.fillStyle = 'rgba(255,255,255,.045)';
  const stripe = w / 8;
  for (let i = 0; i < 8; i += 2) {
    ctx.fillRect(x + i * stripe, y, stripe, h);
  }

  ctx.strokeStyle = 'rgba(255,255,255,.82)';
  ctx.lineWidth = 4;
  drawRoundedRect(ctx, x + 28, y + 28, w - 56, h - 56, 18, 'rgba(0,0,0,0)', 'rgba(255,255,255,.82)', 4);

  ctx.beginPath();
  ctx.moveTo(x + 28, y + h / 2);
  ctx.lineTo(x + w - 28, y + h / 2);
  ctx.stroke();

  ctx.beginPath();
  ctx.arc(x + w / 2, y + h / 2, 70, 0, Math.PI * 2);
  ctx.stroke();

  // Aree
  ctx.strokeRect(x + w / 2 - 145, y + 28, 290, 90);
  ctx.strokeRect(x + w / 2 - 85, y + 28, 170, 54);
  ctx.strokeRect(x + w / 2 - 170, y + h - 118, 340, 90);
  ctx.strokeRect(x + w / 2 - 90, y + h - 82, 180, 54);
  ctx.restore();
}

function drawCenteredText(ctx, text, x, y, maxWidth, font, fill) {
  ctx.font = font;
  ctx.fillStyle = fill;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, x, y, maxWidth);
}

async function createRosterCanvas() {
  const canvas = document.createElement('canvas');
  canvas.width = 1080;
  canvas.height = 1840;
  const ctx = canvas.getContext('2d');

  const bg = ctx.createRadialGradient(540, 0, 120, 540, 300, 1250);
  bg.addColorStop(0, '#2d2d2d');
  bg.addColorStop(.45, '#171717');
  bg.addColorStop(1, '#0d0d0d');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  const teamName = els.managerInput.value.trim() || 'La mia rosa';
  const moduleText = state.module.replace(/^(\d)(\d)(\d)$/, '$1-$2-$3');

  ctx.fillStyle = '#ffffff';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.font = '1000 62px Inter, Arial';
  ctx.fillText('Fanta mondiale', 540, 92);
  ctx.fillText('Fantaballa', 540, 154);

  ctx.fillStyle = '#bdbdbd';
  ctx.font = '900 22px Inter, Arial';
  ctx.fillText(teamName.toUpperCase(), 540, 210);

  const pillY = 250;
  const pillW = 260;
  const pillH = 84;
  const pills = [
    ['MODULO', moduleText],
    ['CREDITI', String(remaining())],
    ['PREVISTO', formatOneDecimal(startersProjection())]
  ];
  pills.forEach((item, i) => {
    const px = 110 + i * 305;
    drawRoundedRect(ctx, px, pillY, pillW, pillH, 20, '#222222', 'rgba(255,255,255,.12)', 2);
    ctx.fillStyle = '#bdbdbd';
    ctx.font = '900 15px Inter, Arial';
    ctx.textAlign = 'center';
    ctx.fillText(item[0], px + pillW / 2, pillY + 24);
    ctx.fillStyle = item[0] === 'PREVISTO' ? '#d6ff00' : '#ffffff';
    ctx.font = '1000 34px Inter, Arial';
    ctx.fillText(item[1], px + pillW / 2, pillY + 58);
  });

  const pitchX = 90;
  const pitchY = 375;
  const pitchW = 900;
  const pitchH = 960;
  drawPitch(ctx, pitchX, pitchY, pitchW, pitchH);

  const groups = { A: [], C: [], D: [], P: [] };
  state.starters.forEach(s => {
    if (s.playerId) groups[s.role].push(player(s.playerId));
  });

  const rows = [
    { players: groups.A, y: pitchY + 145 },
    { players: groups.C, y: pitchY + 370 },
    { players: groups.D, y: pitchY + 605 },
    { players: groups.P, y: pitchY + 825 }
  ];

  rows.forEach(row => {
    const count = Math.max(row.players.length, 1);
    row.players.forEach((p, idx) => {
      const cx = pitchX + pitchW * ((idx + 1) / (count + 1));
      drawPlayerCard(ctx, cx, row.y, p);
    });
  });

  // Panchina
  const benchTitleY = pitchY + pitchH + 62;
  ctx.fillStyle = '#ffffff';
  ctx.font = '1000 30px Inter, Arial';
  ctx.textAlign = 'center';
  ctx.fillText('PANCHINA', 540, benchTitleY);

  const benchPanelX = 70;
  const benchPanelY = benchTitleY + 28;
  const benchPanelW = 940;
  const benchPanelH = 250;
  drawRoundedRect(ctx, benchPanelX, benchPanelY, benchPanelW, benchPanelH, 24, 'rgba(255,255,255,.06)', 'rgba(255,255,255,.12)', 2);

  const benchSlots = state.bench;
  const benchRow1 = benchSlots.slice(0, 3);
  const benchRow2 = benchSlots.slice(3, 5);

  benchRow1.forEach((slot, idx) => {
    const cx = benchPanelX + benchPanelW * ((idx + 1) / (benchRow1.length + 1));
    drawBenchSlot(ctx, cx, benchPanelY + 78, slot);
  });
  benchRow2.forEach((slot, idx) => {
    const cx = benchPanelX + benchPanelW * ((idx + 1) / (benchRow2.length + 1));
    drawBenchSlot(ctx, cx, benchPanelY + 192, slot);
  });

  ctx.fillStyle = '#bdbdbd';
  ctx.font = '800 20px Inter, Arial';
  ctx.textAlign = 'center';
  ctx.fillText('Titolari e panchina · Generato con Fanta mondiale Fantaballa', 540, 1790);

  return canvas;
}

function normalizeImportedPlayer(item, nextId) {
  const name = String(item.name || '').trim();
  const nation = String(item.nation || '').trim();
  const roleRaw = String(item.role || '').trim().toUpperCase();
  const role = ['P', 'D', 'C', 'A'].includes(roleRaw) ? roleRaw : 'C';
  const overall = Number(item.overall || 0);
  const rating = Number(item.rating || Math.round(overall / 2) || 1);
  const cost = Number(item.cost || calculateImportedPlayerCost(rating, role));
  const h = hashCode(name + nation + nextId);

  return {
    id: nextId,
    key: item.key || normalizeName(name),
    name,
    role,
    nation,
    flag: '',
    overall,
    position: item.position || role,
    rating,
    cost,
    popularity: item.popularity || ((h % 500) / 10).toFixed(1),
    fpm: item.fpm || (9 + ((h % 1150) / 100)).toFixed(2).replace('.', ','),
    games: Number(item.games || 0),
    totalPoints: Number(item.totalPoints || 0),
    avgPoints: Number(item.avgPoints || 0),
    goals: Number(item.goals || 0),
    assists: Number(item.assists || 0),
    yellows: Number(item.yellows || 0),
    reds: Number(item.reds || 0),
    cleanSheets: Number(item.cleanSheets || 0),
    goalsConceded: Number(item.goalsConceded || 0)
  };
}

function calculateImportedPlayerCost(rating, role) {
  const coeff = role === 'A' ? 0.78 : role === 'C' ? 0.62 : role === 'D' ? 0.50 : 0.42;
  const premium = role === 'A' ? 11 : role === 'C' ? 7 : role === 'D' ? 4 : 2;
  const raw = ((Number(rating || 0) - 50) * coeff) + premium;
  return Math.max(3, Math.min(70, Math.round(raw)));
}

function mergeOfficialStats(importedPlayers) {
  if (!Array.isArray(importedPlayers)) {
    throw new Error('players_stats.json deve contenere un array di giocatori');
  }

  const statsByKey = new Map();
  importedPlayers.forEach(item => {
    const key = item.key || normalizeName(item.name);
    if (!key) return;
    statsByKey.set(key, item);
  });

  const existingKeys = new Set(players.map(p => p.key || normalizeName(p.name)));
  let updated = 0;
  let added = 0;

  players = players.map(p => {
    const key = p.key || normalizeName(p.name);
    const stats = statsByKey.get(key);
    if (!stats) return { ...p, key };

    updated++;
    return {
      ...p,
      key,
      games: Number(stats.games || 0),
      totalPoints: Number(stats.totalPoints || 0),
      avgPoints: Number(stats.avgPoints || 0),
      goals: Number(stats.goals || 0),
      assists: Number(stats.assists || 0),
      yellows: Number(stats.yellows || 0),
      reds: Number(stats.reds || 0),
      cleanSheets: Number(stats.cleanSheets || 0),
      goalsConceded: Number(stats.goalsConceded || 0)
    };
  });

  importedPlayers.forEach(item => {
    const key = item.key || normalizeName(item.name);
    if (!key || existingKeys.has(key)) return;

    const name = String(item.name || '').trim();
    const nation = String(item.nation || '').trim();
    if (!name || !nation) return;

    const newPlayer = normalizeImportedPlayer(item, players.length + 1);
    players.push(newPlayer);
    existingKeys.add(key);
    added++;

    if (!NATIONAL_TEAMS.includes(newPlayer.nation)) {
      NATIONAL_TEAMS.push(newPlayer.nation);
      NATIONAL_TEAMS.sort();
      populateNations(true);
    }
  });

  players.sort((a,b) => b.cost - a.cost || b.rating - a.rating || a.name.localeCompare(b.name));
  render();
  return { updated, added };
}

async function loadRemoteOfficialStats() {
  try {
    const response = await fetch(`players_stats.json?v=${Date.now()}`, { cache: 'no-store' });
    if (!response.ok) return;
    const imported = await response.json();
    const updated = mergeOfficialStats(imported);
    if (updated > 0) showToast('Statistiche ufficiali aggiornate');
  } catch (err) {
    console.info('players_stats.json non trovato o non caricabile', err);
  }
}


function buildFormationText() {
  const teamName = els.managerInput.value.trim() || 'Senza nome';

  const starters = state.starters.map(s => ({
    slot: ROLE_LABEL[s.role],
    player: s.playerId ? player(s.playerId) : null
  }));

  const benchPlayers = state.bench.map(s => ({
    slot: ROLE_LABEL[s.role],
    player: s.playerId ? player(s.playerId) : null
  }));

  const lines = [];
  lines.push(teamName);
  lines.push('TITOLARI');

  starters.forEach((item, index) => {
    if (!item.player) {
      lines.push(`${index + 1}. ${item.slot} - [VUOTO]`);
      return;
    }
    const p = item.player;
    lines.push(`${index + 1}. ${item.slot} - ${p.name} - ${p.nation}`);
  });

  lines.push('PANCHINA');

  benchPlayers.forEach((item, index) => {
    if (!item.player) {
      lines.push(`${index + 1}. ${item.slot} - [VUOTO]`);
      return;
    }
    const p = item.player;
    lines.push(`${index + 1}. ${item.slot} - ${p.name} - ${p.nation}`);
  });

  return lines.join('\n');
}


function missingRosterParts() {
  const missing = [];

  const emptyStarters = state.starters.filter(s => !s.playerId).length;
  const emptyBench = state.bench.filter(s => !s.playerId).length;

  if (emptyStarters > 0) {
    missing.push(`Completa tutti gli 11 titolari: mancano ${emptyStarters} giocatori.`);
  }

  if (emptyBench > 0) {
    missing.push(`Completa tutta la panchina: mancano ${emptyBench} giocatori.`);
  }

  return missing;
}

  showToast('Testo selezionato');
}


function exportRoster() {
  const data = {
    competizione: 'FantaMondiale FM',
    squadra: els.managerInput.value.trim() || 'Senza nome',
    modulo: state.module,
    budget: BUDGET,
    creditiResidui: remaining(),
    punteggioPrevistoTitolari: startersProjection(),
    punteggioPrevistoRosa: rosterProjection(),
    titolari: state.starters.map(s => ({ slot: ROLE_LABEL[s.role], giocatore: s.playerId ? player(s.playerId) : null })),
    panchina: state.bench.map(s => ({ slot: ROLE_LABEL[s.role], giocatore: s.playerId ? player(s.playerId) : null })),
    regolamento: {
      voto: 'voto Football Manager',
      gol: 3,
      assist: 1,
      autogol: -3,
      giallo: -0.5,
      rosso: -1,
      cartellini: 'giallo e rosso non si sommano; vale il rosso'
    }
  };
  els.exportBoxWrap.style.display = 'block';
  els.exportBox.value = JSON.stringify(data, null, 2);
  showToast('Rosa salvata ed esportata');
}
populateNations();
els.managerInput.value = state.manager || '';
render();
loadRemoteOfficialStats();

document.querySelectorAll('.chip').forEach(chip => chip.addEventListener('click', () => { roleFilter = chip.dataset.role; document.querySelectorAll('.chip').forEach(c => c.classList.toggle('active', c === chip)); renderPlayers(); }));
els.searchInput.addEventListener('input', renderPlayers);
els.nationFilter.addEventListener('change', renderPlayers);
els.sortSelect.addEventListener('change', renderPlayers);
els.moduleSelect.addEventListener('change', e => changeModule(e.target.value));
els.managerInput.addEventListener('input', saveLocal);
document.getElementById('randomBtn').addEventListener('click', randomTeam);
document.getElementById('cancelBtn').addEventListener('click', () => { if (!confirm('Vuoi davvero svuotare tutta la rosa?')) return; state = newState(state.module); state.manager = els.managerInput.value.trim(); activeSlot = null; saveLocal(); render(); });
els.sendBtn.addEventListener('click', openSendModal);
document.getElementById('downloadBtn').addEventListener('click', downloadRosterImage);
document.getElementById('shareBtn').addEventListener('click', shareRoster);
els.copySendBtn.addEventListener('click', copySendText);
els.selectSendBtn.addEventListener('click', selectSendText);
els.sendClose.addEventListener('click', closeSendModal);
els.sendBackdrop.addEventListener('click', closeSendModal);
document.addEventListener('keydown', (event) => { if (event.key === 'Escape') closeSendModal(); });
</script>
